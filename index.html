<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#a8ccb6">
    <title>Vocab Garden — Review Test 1 · IELTS Thầy Pháp</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* ============================================================
           THEME — ported verbatim from VocabApp.jsx getTheme(false) L416-424
           ============================================================ */
        :root {
            --bg: #a8ccb6;
            --text: #0f172a;
            --text-sub: #2d3e36;
            --text-muted: #3d5248;
            --primary: #009040;
            --primary-light: #16a34a;
            --primary-dark: #0d3d1f;
            --accent: #f59e0b;
            --accent-light: #fbbf24;
            --surface: #ffffff;
            --surface-elevated: #eef3f0;
            --border: rgba(0, 80, 40, 0.10);
            --border-strong: rgba(0, 144, 64, 0.25);
            --tab-track: rgba(255, 255, 255, 0.45);
            --tab-face: #ffffff;
            --shadow: rgba(0, 60, 30, 0.08);
            --card-shadow: 0 4px 20px rgba(0, 60, 30, 0.10);
            --card-shadow-hover: 0 8px 28px rgba(0, 60, 30, 0.16);
            --success: #16a34a;
            --success-soft: #dcfce7;
            --danger: #dc2626;
            --danger-soft: #fee2e2;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Plus Jakarta Sans', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.55;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ============================================================
           SPLASH
           ============================================================ */
        #audioUnlocker {
            position: fixed; inset: 0;
            background: var(--bg);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; text-align: center; padding: 24px;
        }
        .splash-mark { width: 84px; height: 84px; margin-bottom: 18px; }
        .splash-eyebrow {
            font-size: 11px; font-weight: 700;
            color: var(--primary-dark);
            letter-spacing: 0.14em; text-transform: uppercase;
            margin-bottom: 10px; opacity: 0.85;
        }
        .splash-eyebrow .accent { color: #c2590a; }
        .splash-title {
            font-size: clamp(28px, 7vw, 42px);
            font-weight: 800; color: var(--primary-dark);
            letter-spacing: -0.025em; line-height: 1.05;
            margin-bottom: 8px;
        }
        .splash-sub {
            font-size: 15px; color: var(--text-sub);
            margin-bottom: 32px; font-weight: 500;
        }
        .unlock-btn {
            background: var(--primary); color: #fff;
            padding: 14px 36px; border-radius: 12px;
            font-weight: 700; border: none; cursor: pointer;
            font-size: 15px; font-family: inherit;
            letter-spacing: 0.01em;
            box-shadow: 0 4px 16px rgba(0, 144, 64, 0.32);
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }
        .unlock-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(0, 144, 64, 0.42); }

        /* ============================================================
           OUTER (va-outer)
           ============================================================ */
        .va-outer { padding: 12px 12px 80px; }
        @media (min-width: 600px) {
            .va-outer { max-width: 1400px; margin: 0 auto; padding: 16px 16px 80px; }
        }

        /* ============================================================
           HEADER — verbatim from VocabApp.jsx:1297
           ============================================================ */
        .va-header {
            display: flex; align-items: center; gap: 12px;
            margin-bottom: 16px; padding-bottom: 16px;
            border-bottom: 2px solid var(--border);
        }
        .header-icon-btn {
            padding: 7px 12px; border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.7);
            background: transparent;
            color: var(--text-sub);
            cursor: pointer; flex-shrink: 0;
            font-family: inherit;
            display: inline-flex; align-items: center; justify-content: center;
            transition: background 0.15s;
        }
        .header-icon-btn:hover { background: rgba(255, 255, 255, 0.3); }
        .header-icon-btn svg { width: 16px; height: 16px; }
        .va-title {
            font-size: clamp(20px, 4vw, 28px);
            font-weight: 700;
            color: var(--primary-dark);
            letter-spacing: -0.4px;
            display: flex; align-items: center; gap: 6px;
            background: rgba(255, 255, 255, 0.5);
            border: 1.5px solid rgba(255, 255, 255, 0.8);
            padding: 4px 12px;
            border-radius: 10px;
        }
        .va-title svg { width: 22px; height: 22px; flex-shrink: 0; }
        .va-back-btn {
            margin-left: auto;
            display: flex; align-items: center; gap: 6px;
            padding: 7px 14px; border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.7);
            background: transparent;
            color: var(--text-sub);
            font-size: 13px; font-weight: 600;
            cursor: pointer; font-family: inherit;
            flex-shrink: 0;
            transition: background 0.15s;
            text-decoration: none;
        }
        .va-back-btn:hover { background: rgba(255, 255, 255, 0.3); }
        .va-back-text { display: none; }
        @media (min-width: 600px) { .va-back-text { display: inline; } }

        /* ============================================================
           REC BAR — verbatim from VocabApp.jsx:1360
           ============================================================ */
        .va-rec-bar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 18px;
            border-radius: 14px;
            background: var(--surface);
            border: 2px solid var(--primary);
            box-shadow: 0 4px 20px rgba(0, 144, 64, 0.12), 0 0 0 1px rgba(0, 144, 64, 0.06);
            gap: 12px; margin-bottom: 16px;
            animation: rec-pulse 3s ease-in-out infinite;
        }
        @keyframes rec-pulse {
            0%, 100% { box-shadow: 0 4px 20px rgba(0, 144, 64, 0.12), 0 0 0 2px rgba(0, 144, 64, 0.08); }
            50%      { box-shadow: 0 4px 28px rgba(0, 144, 64, 0.25), 0 0 0 4px rgba(0, 144, 64, 0.15); }
        }
        .va-rec-bar .rec-eyebrow {
            font-size: 11px; font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.01em;
            color: #15803d;
            margin-bottom: 2px;
            display: flex; align-items: center; gap: 4px;
        }
        .va-rec-bar .rec-eyebrow svg { width: 12px; height: 12px; }
        .va-rec-bar .rec-title { font-size: 14px; font-weight: 700; color: var(--text); }
        .va-rec-bar .rec-cta {
            padding: 10px 20px;
            background: var(--primary);
            color: white; border: none;
            border-radius: 10px;
            font-size: 13px; font-weight: 700;
            cursor: pointer; white-space: nowrap;
            font-family: inherit;
            box-shadow: 0 2px 8px rgba(0, 144, 64, 0.25);
            display: inline-flex; align-items: center; gap: 6px;
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .va-rec-bar .rec-cta:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0, 144, 64, 0.35); }
        .va-rec-bar .rec-cta svg { width: 14px; height: 14px; }

        /* ============================================================
           CONTEXT SEGMENT — verbatim from VocabApp.jsx:1442
           ============================================================ */
        .va-context-seg {
            display: flex; gap: 3px;
            background: var(--tab-track);
            padding: 3px; border-radius: 11px;
            margin-bottom: 8px;
        }
        .va-context-btn {
            flex: 1; padding: 8px 4px;
            border-radius: 8px; border: none;
            background: transparent;
            color: var(--text-sub);
            font-weight: 700; font-size: 12px;
            cursor: pointer; font-family: inherit;
            transition: all 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 4px;
        }
        .va-context-btn.active {
            background: var(--tab-face);
            color: var(--text);
            box-shadow: 0 1px 4px var(--shadow);
        }
        .va-context-btn.locked {
            cursor: not-allowed;
            background: linear-gradient(110deg, transparent 30%, rgba(255,255,255,.35) 48%, rgba(255,255,255,.45) 52%, transparent 70%);
            color: rgba(0, 0, 0, 0.55);
            border-radius: 9px 9px 8px 8px;
            border-bottom: 1.5px dotted rgba(0, 0, 0, 0.18);
        }
        .va-context-btn.locked svg { width: 10px; height: 10px; }

        /* ============================================================
           SKILL TAB BAR — verbatim from VocabApp.jsx:1492
           ============================================================ */
        .va-skill-wrap { position: relative; margin-bottom: 20px; }
        .va-tab-bar {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 3px;
            background: var(--tab-track);
            padding: 3px;
            border-radius: 11px;
            position: relative;
        }
        @media (min-width: 600px) {
            .va-tab-bar { grid-template-columns: repeat(6, 1fr); }
        }
        .va-tab-indicator {
            position: absolute;
            top: 3px; height: 31px;
            border-radius: 8px;
            background: var(--tab-face);
            box-shadow: 0 1px 4px var(--shadow);
            transition: left .25s cubic-bezier(.4,0,.2,1), width .25s cubic-bezier(.4,0,.2,1);
            z-index: 0; pointer-events: none;
        }
        .va-tab-btn {
            height: 31px; border: none; background: transparent;
            color: var(--text-muted);
            font-size: 11px; font-weight: 700;
            cursor: pointer;
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center; gap: 5px;
            position: relative; z-index: 1;
            white-space: nowrap; font-family: inherit;
            transition: color .15s;
        }
        .va-tab-btn.active { color: var(--text); }
        .va-tab-btn .tab-icon-sq {
            display: inline-flex; align-items: center; justify-content: center;
            width: 20px; height: 20px;
            border-radius: 5px;
            flex-shrink: 0;
            opacity: 0.55;
            transition: opacity 0.15s;
        }
        .va-tab-btn.active .tab-icon-sq { opacity: 1; }
        .va-tab-btn .tab-icon-sq svg { width: 12px; height: 12px; }

        /* ============================================================
           WORD GRID — verbatim from VocabApp.jsx:1834
           ============================================================ */
        .va-word-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 10px;
            animation: fadeIn 0.4s ease-out;
        }
        @media (min-width: 600px) {
            .va-word-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 14px; }
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes cardAppear { from { opacity: 0; transform: translateY(8px) scale(0.99); } to { opacity: 1; transform: translateY(0) scale(1); } }

        .va-word-card {
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: 14px;
            padding: 16px 14px;
            cursor: pointer;
            transition: all 0.15s;
            box-shadow: var(--card-shadow);
            text-align: center;
            position: relative;
            min-height: 90px;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
            animation: cardAppear 280ms ease-out both;
        }
        .va-word-grid > .va-word-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--card-shadow-hover);
            border-color: var(--border-strong);
        }
        .va-word-card .card-word { font-size: 15px; font-weight: 700; color: var(--text); line-height: 1.3; }

        /* Placeholder panel for non-Reading tabs */
        .va-placeholder {
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: 14px;
            padding: 40px 24px;
            text-align: center;
            box-shadow: var(--card-shadow);
            animation: fadeIn 0.4s ease-out;
        }
        .va-placeholder svg { width: 36px; height: 36px; color: var(--text-muted); margin-bottom: 8px; }
        .va-placeholder .ph-title { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
        .va-placeholder .ph-sub { font-size: 12px; color: var(--text-sub); line-height: 1.6; max-width: 320px; margin: 0 auto; }

        /* ============================================================
           WORD MODAL — verbatim from VocabApp.jsx:2060
           ============================================================ */
        #modalBackdrop {
            position: fixed; inset: 0;
            background: rgba(0, 0, 0, 0.35);
            opacity: 0;
            transition: opacity 0.25s ease;
            z-index: 99; pointer-events: none;
        }
        #modalBackdrop.active { opacity: 1; pointer-events: auto; }

        .va-word-modal {
            position: fixed;
            left: 0; right: 0; bottom: 0;
            background: var(--surface);
            border-radius: 24px 24px 0 0;
            box-shadow: 0 -8px 40px rgba(0, 0, 0, 0.15);
            transform: translateY(100%);
            transition: transform 0.32s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100; max-height: 90vh;
            display: flex; flex-direction: column;
        }
        .va-word-modal.active { transform: translateY(0); }

        .modal-top { padding: 12px 16px 8px; flex-shrink: 0; }
        .drag-handle {
            width: 40px; height: 4px;
            background: var(--border);
            border-radius: 2px;
            margin: 0 auto 8px;
        }
        .modal-top-row { display: flex; align-items: center; justify-content: flex-end; }
        .modal-close {
            width: 36px; height: 36px;
            border-radius: 50%;
            border: 1.5px solid var(--border);
            background: var(--surface-elevated);
            cursor: pointer;
            font-size: 20px;
            display: flex; align-items: center; justify-content: center;
            color: var(--text);
            font-family: inherit;
        }
        .modal-close:hover { background: var(--border); }

        .modal-body {
            flex: 1; min-width: 0;
            overflow-y: auto;
            padding: 0 20px 32px;
            text-align: left;
        }

        .va-word-head {
            display: flex; gap: 14px; align-items: stretch;
            margin-bottom: 12px;
        }
        .va-word-left {
            flex: 0 0 50%;
            padding-right: 14px;
            border-right: 2px solid rgba(0, 80, 40, 0.28);
        }
        .va-word-left-inner {
            display: flex; align-items: flex-start;
            gap: 10px; margin-bottom: 6px;
            justify-content: flex-end;
        }
        .speaker-btn {
            flex-shrink: 0;
            width: 32px; height: 32px;
            border-radius: 50%;
            border: none;
            background: var(--primary);
            color: white;
            cursor: pointer;
            margin-top: 2px;
            display: inline-flex; align-items: center; justify-content: center;
            padding: 0;
            box-shadow: 0 2px 6px rgba(0, 144, 64, 0.3);
        }
        .speaker-btn:hover { background: var(--primary-light); }
        .speaker-btn svg { width: 14px; height: 14px; }
        .word-meta { display: inline-flex; flex-direction: column; min-width: 0; }
        .word-h2 {
            font-size: clamp(20px, 4.2vw, 28px);
            font-weight: 800; line-height: 1.1;
            margin: 0 0 4px;
            color: var(--text);
            overflow-wrap: break-word; word-break: break-word;
            text-align: right;
        }
        .word-ipa {
            font-size: 14px; font-weight: 600;
            color: var(--primary-light);
            letter-spacing: 0.3px;
            text-align: right;
        }
        .va-word-right { flex: 1; padding-left: 4px; }
        .word-meaning {
            font-size: 20px; font-weight: 700;
            color: var(--text);
            margin: 0 0 6px;
            line-height: 1.25;
        }
        .word-paraphrase {
            font-size: 15px; line-height: 1.65;
            margin: 8px 0;
            background: var(--surface-elevated);
            padding: 11px 16px;
            border-radius: 10px;
            border-left: 3px solid var(--accent);
            color: var(--text);
            opacity: 0.92;
        }
        .word-collo {
            font-size: 14px; margin: 8px 0;
            padding: 11px 16px;
            background: rgba(0, 144, 64, 0.06);
            border-radius: 10px;
            border-left: 3px solid var(--primary);
            color: var(--text-sub);
            line-height: 1.5;
        }
        .word-collo strong { color: var(--primary-dark); font-weight: 700; }

        /* ============================================================
           QUIZ OVERLAY — YouGlish dictation pattern
           ============================================================ */
        #quizOverlay {
            position: fixed; inset: 0;
            background: rgba(13, 61, 31, 0.75);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            display: none;
            align-items: center; justify-content: center;
            z-index: 1000; padding: 12px;
            overflow-y: auto;
        }
        .quiz-container {
            background: var(--surface);
            width: 100%; max-width: 540px;
            padding: 22px 20px 18px;
            border-radius: 20px;
            position: relative;
            display: flex; flex-direction: column;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            margin: auto;
        }

        .quiz-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 14px;
            font-size: 11px; color: var(--text-muted); font-weight: 700;
            letter-spacing: 0.1em; text-transform: uppercase;
            font-variant-numeric: tabular-nums;
        }

        /* YouGlish player wrapper — verbatim from YGDictationQuestion.jsx:105 */
        .yg-player-wrap {
            position: relative;
            height: 280px;
            overflow: hidden;
            border-radius: 8px;
            background: #000;
        }
        .yg-player-wrap > div { width: 100%; }
        .yg-mask {
            position: absolute;
            left: 0; right: 0; bottom: 0;
            height: 45px;
            background: #000;
            pointer-events: none;
            z-index: 10;
        }
        .yg-loading {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            color: rgba(255, 255, 255, 0.6);
            font-size: 13px; font-weight: 600;
            letter-spacing: 0.05em;
            z-index: 5;
        }
        .yg-replay-btn {
            margin-top: 10px; width: 100%;
            padding: 12px;
            background: #1d4ed8;
            color: #fff; border: none;
            border-radius: 8px;
            font-size: 14px; font-weight: 700;
            cursor: pointer; font-family: inherit;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            transition: background 0.15s;
        }
        .yg-replay-btn:hover { background: #1e40af; }
        .yg-replay-btn svg { width: 18px; height: 18px; }
        .yg-hint {
            margin-top: 14px;
            font-size: 13px;
            color: #64748b;
            text-align: center;
        }
        .yg-choices {
            display: flex; flex-direction: column;
            gap: 10px;
            margin: 20px 0 0;
        }
        .yg-choice {
            border: 2px solid #e2e8f0;
            background: #fff;
            padding: 14px 18px;
            border-radius: 10px;
            cursor: pointer; font-family: inherit;
            font-size: 16px; font-weight: 600;
            color: #0f172a;
            text-align: left;
            display: flex; align-items: center; justify-content: space-between;
            transition: all 0.15s;
        }
        .yg-choice:hover:not(:disabled) { border-color: var(--primary); }
        .yg-choice:disabled { cursor: default; }
        .yg-choice.locked { opacity: 0.5; color: #94a3b8; cursor: default; }
        .yg-choice.correct {
            border-color: var(--success);
            background: var(--success-soft);
        }
        .yg-choice.wrong {
            border-color: var(--danger);
            background: var(--danger-soft);
        }
        .yg-choice .suffix { font-size: 14px; }
        .yg-choice.correct .suffix { color: var(--success); }
        .yg-choice.wrong .suffix { color: var(--danger); }

        .btn-stop {
            margin-top: 18px;
            align-self: center;
            border: none; background: none;
            color: var(--text-muted); font-weight: 700;
            font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
            cursor: pointer; padding: 10px;
            font-family: inherit;
        }
        .btn-stop:hover { color: var(--text); }

        /* MILESTONE */
        .milestone-screen {
            padding: 32px 4px 12px;
            text-align: center;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 480px;
        }
        .milestone-icon-wrap {
            width: 72px; height: 72px;
            display: inline-flex; align-items: center; justify-content: center;
            border-radius: 20px; margin-bottom: 10px;
        }
        .milestone-icon-wrap.win { background: rgba(0, 144, 64, 0.10); color: var(--primary); }
        .milestone-icon-wrap.mid { background: rgba(245, 158, 11, 0.12); color: var(--accent); }
        .milestone-icon-wrap.low { background: rgba(220, 38, 38, 0.10); color: var(--danger); }
        .milestone-icon-wrap svg { width: 38px; height: 38px; }
        .milestone-title {
            font-size: 11px; font-weight: 800;
            color: var(--text-muted);
            letter-spacing: 0.16em; text-transform: uppercase;
            margin-bottom: 4px;
        }
        .milestone-score {
            font-size: 88px; font-weight: 800;
            color: var(--text);
            margin: 6px 0;
            letter-spacing: -0.04em; line-height: 1;
            font-variant-numeric: tabular-nums;
        }
        .milestone-score .pct {
            font-size: 28px; font-weight: 700;
            color: var(--text-muted);
            margin-left: 2px; vertical-align: top;
            position: relative; top: 14px;
        }
        .milestone-msg {
            font-weight: 600; color: var(--text-sub);
            margin-bottom: 24px;
            font-size: 15px; padding: 0 14px; line-height: 1.5;
            max-width: 380px;
        }
        .action-btn {
            background: var(--primary); color: #fff;
            border: none;
            padding: 14px 28px; border-radius: 12px;
            font-weight: 700; cursor: pointer;
            width: 100%; margin-top: 8px;
            font-size: 15px; letter-spacing: 0.01em;
            font-family: inherit;
            box-shadow: 0 4px 16px rgba(0, 144, 64, 0.28);
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .action-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(0, 144, 64, 0.38); }
        .secondary-btn {
            background: transparent;
            color: var(--text-sub);
            border: 1.5px solid var(--border);
            padding: 12px 28px; border-radius: 12px;
            font-weight: 700; cursor: pointer;
            width: 100%; margin-top: 8px;
            font-size: 14px; font-family: inherit;

            background: var(--surface);
            padding: 12px 14px;
            font-family: inherit; font-weight: 700;
            font-size: 15px; color: var(--text);

        /* TOAST */
        #toast {

            z-index: 9000;
            max-width: calc(100vw - 40px);
        }
        #toast.active { opacity: 1; transform: translate(-50%, 0); pointer-events: auto; }

    function playSound(type) {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        oscillator.connect(gainNode); gainNode.connect(audioCtx.destination);
        if (type === 'correct') {
            oscillator.frequency.setValueAtTime(880, audioCtx.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(1320, audioCtx.currentTime + 0.1);
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime); oscillator.start(); oscillator.stop(audioCtx.currentTime + 0.3);
        } else {
            oscillator.type = 'sawtooth'; oscillator.frequency.setValueAtTime(220, audioCtx.currentTime);
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime); oscillator.start(); oscillator.stop(audioCtx.currentTime + 0.4);
        }
    }

    function startApp() {
        document.getElementById('audioUnlocker').style.display = 'none';
        document.getElementById('mainContent').style.display = 'block';
        populateVoices();
        buildTabBar();
        buildGrid();
        // initial indicator position after layout settles
        requestAnimationFrame(() => moveTabIndicator('reading'));
    }

    function toast(msg) {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.classList.add('active');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => el.classList.remove('active'), 2400);
    }

    // ────────────────────────────────────────────────────────────
    // Tab bar — sliding pill indicator pattern from VocabApp.jsx:1492
    // ────────────────────────────────────────────────────────────
    function buildTabBar() {
        const bar = document.getElementById('tabBar');
        const indicator = document.getElementById('tabIndicator');
        bar.innerHTML = '';
        bar.appendChild(indicator);
        TAB_CONFIG.forEach(tab => {
            const btn = document.createElement('button');
            btn.className = 'va-tab-btn' + (tab.view === currentTab ? ' active' : '');
            btn.dataset.view = tab.view;
            btn.innerHTML = `
                <span class="tab-icon-sq" style="background: ${tab.color}">${tab.svg}</span>
                ${tab.label}
            `;
            btn.onclick = () => switchTab(tab.view);
            bar.appendChild(btn);
        });
    }

    function moveTabIndicator(view) {
        const bar = document.getElementById('tabBar');
        const indicator = document.getElementById('tabIndicator');
        const target = bar.querySelector(`.va-tab-btn[data-view="${view}"]`);
        if (!target || !indicator) return;
        const barRect = bar.getBoundingClientRect();
        const tRect = target.getBoundingClientRect();
        indicator.style.left = (tRect.left - barRect.left) + 'px';
        indicator.style.width = tRect.width + 'px';
    }

    function switchTab(view) {
        currentTab = view;
        // Update active class
        document.querySelectorAll('.va-tab-btn').forEach(b => {
            b.classList.toggle('active', b.dataset.view === view);
        });
        moveTabIndicator(view);

        // Switch content
        const content = document.getElementById('contentArea');
        if (view === 'reading') {
            content.innerHTML = '<div class="va-word-grid" id="vocabGrid"></div>';
            buildGrid();
        } else if (view === 'quiz') {
            openModeSelection();
        } else if (view === 'review') {
            openModeSelection();
        } else {
            const labels = { listening: 'Listening', term_test: 'Giữa kỳ', progress: 'Tiến trình' };
            content.innerHTML = `
                <div class="va-placeholder">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="9"/><path d="M12 8v4M12 16h.01"/>
                    </svg>
                    <div class="ph-title">${labels[view]} có trên site chính</div>
                    <div class="ph-sub">Bản standalone này chỉ chứa từ vựng Reading của Review Test 1. Đăng nhập site chính để mở khóa toàn bộ.</div>
                </div>
            `;
        }
    }

    window.addEventListener('resize', () => moveTabIndicator(currentTab));

    // ────────────────────────────────────────────────────────────
    // Word grid + modal
    // ────────────────────────────────────────────────────────────
    function buildGrid() {
        const grid = document.getElementById('vocabGrid');
        if (!grid) return;
        grid.innerHTML = '';
        Object.entries(VOCAB_DATA).forEach(([word, info], idx) => {
            const card = document.createElement('div');
            card.className = 'va-word-card';
            card.style.animationDelay = (idx * 30) + 'ms';
            card.innerHTML = `<span class="card-word">${word}</span>`;
            card.onclick = () => openModal(word);
            grid.appendChild(card);
        });
    }

    function openModal(word) {
        const info = VOCAB_DATA[word];
        if (!info) return;
        const body = document.getElementById('modalBody');
        body.innerHTML = `
            <div class="va-word-head">
                <div class="va-word-left">
                    <div class="va-word-left-inner">
                        <button class="speaker-btn" aria-label="Phát âm" onclick="speak(${JSON.stringify(word)})">
                            ${SPEAKER_SVG}
                        </button>
                        <div class="word-meta">
                            <h2 class="word-h2">${word}</h2>
                            <span class="word-ipa">${info.ipa}</span>
                        </div>
                    </div>
                </div>
                <div class="va-word-right">
                    <div class="word-meaning">${info.meaning}</div>
                </div>
            </div>
            <div class="word-paraphrase">${info.def}</div>
            <div class="word-collo"><strong>Cụm thường gặp:</strong> ${info.collo}</div>
            <div class="word-collo"><strong>Ví dụ:</strong> ${info.sentence}</div>
        `;
        document.getElementById('modalBackdrop').classList.add('active');
        document.getElementById('wordModal').classList.add('active');
        speak(word);
    }
    function closeModal() {
        document.getElementById('modalBackdrop').classList.remove('active');
        document.getElementById('wordModal').classList.remove('active');
    }

    // ────────────────────────────────────────────────────────────
    // YouGlish loader — verbatim from YGDictationQuestion.jsx:9
    // ────────────────────────────────────────────────────────────
    const YG_SCRIPT = 'https://youglish.com/public/emb/widget.js';
    function loadYG() {
        if (window.YG && window.YG.Widget) return Promise.resolve(window.YG);
        return new Promise((resolve) => {
            const prev = window.onYouglishAPIReady;
            window.onYouglishAPIReady = () => {
                if (typeof prev === 'function') prev();
                resolve(window.YG);
            };
            if (!document.getElementById('youglish-api')) {
                const tag = document.createElement('script');
                tag.id = 'youglish-api';
                tag.src = YG_SCRIPT;
                document.head.appendChild(tag);
            }
        });
    }

    // Function-word-aware fallback queries — simplified port from
    // lib/quiz-shared.js generateFallbackQueriesBoth (in main site).
    function generateFallbackQueries(phrase) {
        const cleaned = phrase.replace(/^to\s+/i, '').replace(/^(a|an|the)\s+/i, '').trim();
        const queries = [cleaned];
        const words = cleaned.split(/\s+/);
        // Last content word
        if (words.length > 1) queries.push(words[words.length - 1]);
        // Last 2 words
        if (words.length > 2) queries.push(words.slice(-2).join(' '));
        // Strip leading function words
        const FN = /^(of|in|on|at|to|for|with|by|from|the|a|an)$/i;
        let drop = 0;
        while (drop < words.length - 1 && FN.test(words[drop])) drop++;
        if (drop > 0) queries.push(words.slice(drop).join(' '));
        return [...new Set(queries)];
    }

    // ────────────────────────────────────────────────────────────
    // Quiz state
    // ────────────────────────────────────────────────────────────
    let quizQueue = [];
    let currentQuiz = null;  // { target, distractors, meaning, choices, picked, hasPlayed, widget }
    let wrongAnswerBuffer = [];
    let sessionStats = { correctInMilestone: 0, questionsInMilestone: 0, totalCorrect: 0, milestoneSize: 10, currentLimit: 10 };

    function openModeSelection() {
        document.getElementById('quizOverlay').style.display = 'flex';
        const container = document.getElementById('quizContainer');
        const total = Object.keys(VOCAB_DATA).length;
        container.innerHTML = `
            <div class="milestone-screen">
                <div class="mode-title">YouGlish Dictation</div>
                <div class="mode-sub">Nghe clip → chọn đúng từ. Chọn số câu để bắt đầu</div>
                <div class="mode-grid">
                    <button class="mode-btn" onclick="startQuiz(10)">
                        <span class="mode-num">10</span>
                        <span class="mode-label">10 câu<small>Khởi động nhanh</small></span>
                        <span class="mode-arrow">${ARROW_RIGHT_SVG}</span>
                    </button>
                    <button class="mode-btn" onclick="startQuiz(20)">
                        <span class="mode-num">20</span>
                        <span class="mode-label">20 câu<small>Luyện chắc tay</small></span>
                        <span class="mode-arrow">${ARROW_RIGHT_SVG}</span>
                    </button>
                    <button class="mode-btn" onclick="startQuiz(${total})">
                        <span class="mode-num">${total}</span>
                        <span class="mode-label">Toàn bộ ${total} từ<small>Kiểm tra tổng quát</small></span>
                        <span class="mode-arrow">${ARROW_RIGHT_SVG}</span>
                    </button>
                </div>
                <button class="cancel-btn" onclick="closeQuiz()">Hủy bỏ</button>
            </div>
        `;
    }

    function startQuiz(limit) {
        sessionStats.currentLimit = limit;
        sessionStats.milestoneSize = limit;
        const allWords = Object.keys(VOCAB_DATA).sort(() => Math.random() - 0.5);
        quizQueue = allWords.slice(0, limit);
        wrongAnswerBuffer = [];
        sessionStats.correctInMilestone = 0;
        sessionStats.questionsInMilestone = 0;
        sessionStats.totalCorrect = 0;
        nextQuestion();
    }

    function shuffle(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
    }

    function closeQuiz() {
        document.getElementById('quizOverlay').style.display = 'none';
        if (currentQuiz?.widget) {
            try { currentQuiz.widget.replay = () => {}; } catch {}
        }
        currentQuiz = null;
    }

    function nextQuestion() {
        if (sessionStats.questionsInMilestone >= sessionStats.milestoneSize && quizQueue.length > 0) return showMilestone();
        if (quizQueue.length === 0 && wrongAnswerBuffer.length > 0) quizQueue.push(wrongAnswerBuffer.shift());
        if (quizQueue.length === 0) return showMilestone(true);

        const target = quizQueue.shift();
        const targetMeaning = VOCAB_DATA[target].meaning;
        const distractors = Object.keys(VOCAB_DATA)
            .filter(w => w !== target)
            .sort(() => Math.random() - 0.5)
            .slice(0, 2);
        const choices = shuffle([target, ...distractors]);

        currentQuiz = { target, meaning: targetMeaning, distractors, choices, picked: null, hasPlayed: false, widget: null };
        renderQuizQuestion();
    }

    function renderQuizQuestion() {
        const q = currentQuiz;
        const container = document.getElementById('quizContainer');
        const playerId = 'yg-quiz-' + Math.random().toString(36).slice(2, 10);
        container.innerHTML = `
            <div class="quiz-header">
                <span>Câu ${sessionStats.questionsInMilestone + 1} / ${sessionStats.milestoneSize}</span>
                <span>YouGlish Dictation</span>
            </div>
            <div class="yg-player-wrap">
                <div id="${playerId}"></div>
                <div class="yg-loading" id="ygLoading">Đang tải clip…</div>
                <div class="yg-mask"></div>
            </div>
            <button class="yg-replay-btn" id="ygReplay" disabled style="opacity:0.5;cursor:default;">
                ${REPLAY_SVG}
                Nghe lại clip
            </button>
            <div class="yg-hint" id="ygHint">Bấm play trên clip để mở khoá câu trả lời</div>
            <div class="yg-choices" id="ygChoices"></div>
            <button class="btn-stop" onclick="closeQuiz()">Dừng chơi</button>
        `;

        // Render locked choice buttons
        const choicesEl = document.getElementById('ygChoices');
        q.choices.forEach((choice, i) => {
            const btn = document.createElement('button');
            btn.className = 'yg-choice locked';
            btn.disabled = true;
            btn.innerHTML = `<span>${choice}</span><span class="suffix"></span>`;
            btn.onclick = () => handlePick(choice, btn);
            choicesEl.appendChild(btn);
        });

        // Load YouGlish widget
        const queries = generateFallbackQueries(q.target);
        let queryIdx = 0;
        loadYG().then(YG => {
            if (!YG || !currentQuiz || currentQuiz.target !== q.target) return;
            try {
                const outer = document.getElementById(playerId)?.parentElement;
                const measured = outer?.clientWidth || 480;
                const widget = new YG.Widget(playerId, {
                    width: Math.min(480, Math.max(280, measured)),
                    height: 600,
                    components: 16,
                    events: {
                        onFetchDone: (e) => {
                            if (!currentQuiz || currentQuiz.target !== q.target) return;
                            if (e.totalResult === 0 && queryIdx < queries.length - 1) {
                                queryIdx++;
                                try { widget.fetch(queries[queryIdx], 'English', 'uk'); } catch {}
                            } else {
                                document.getElementById('ygLoading')?.remove();
                            }
                        },
                        onPlayerStateChange: (e) => {
                            if (!currentQuiz || currentQuiz.target !== q.target) return;
                            const state = typeof e === 'number' ? e : (e?.data ?? e?.state);
                            if (state === 1 && !currentQuiz.hasPlayed) {
                                currentQuiz.hasPlayed = true;
                                unlockChoices();
                            }
                            if (state === 0) {
                                try { widget.replay?.(); } catch {}
                            }
                        }
                    }
                });
                currentQuiz.widget = widget;
                try { widget.fetch(queries[0], 'English', 'uk'); } catch {}
                // Enable replay button after widget loads
                const replayBtn = document.getElementById('ygReplay');
                if (replayBtn) {
                    replayBtn.disabled = false;
                    replayBtn.style.opacity = '1';
                    replayBtn.style.cursor = 'pointer';
                    replayBtn.onclick = () => { try { widget.replay?.(); } catch {} };
                }
            } catch (err) { console.error(err); }
        });
    }

    function unlockChoices() {
        document.getElementById('ygHint')?.remove();
        document.querySelectorAll('#ygChoices .yg-choice').forEach(b => {
            b.classList.remove('locked');
            b.disabled = false;
        });
    }

    function handlePick(choice, btn) {
        const q = currentQuiz;
        if (!q || q.picked || !q.hasPlayed) return;
        q.picked = choice;
        const isCorrect = choice === q.target;

        document.querySelectorAll('#ygChoices .yg-choice').forEach(b => {
            b.disabled = true;
            const text = b.querySelector('span').textContent;
            const suffix = b.querySelector('.suffix');
            if (text === q.target) {
                b.classList.add('correct');
                if (suffix) suffix.textContent = '✓ ' + q.meaning;
            } else if (text === choice && !isCorrect) {
                b.classList.add('wrong');
                if (suffix) suffix.textContent = '✗';
            }
        });

        if (isCorrect) {
            sessionStats.totalCorrect++;
            sessionStats.correctInMilestone++;
            playSound('correct');
        } else {
            playSound('wrong');
            wrongAnswerBuffer.push(q.target);
        }
        sessionStats.questionsInMilestone++;
        setTimeout(nextQuestion, 1800);
    }

    function showMilestone(isFinal = false) {
        const total = isFinal ? sessionStats.questionsInMilestone : sessionStats.milestoneSize;
        const correct = sessionStats.correctInMilestone;
        const percent = total > 0 ? Math.round((correct / total) * 100) : 0;

        let message = "", iconHTML = "", iconClass = "mid";
        if (percent === 100)       { message = "Hoàn hảo! Bạn nắm chắc cả 30 từ rồi đó."; iconHTML = ICON_TROPHY; iconClass = "win"; }
        else if (percent >= 90)    { message = "Gần như hoàn hảo. Một chút nữa thôi."; iconHTML = ICON_SPARK; iconClass = "win"; }
        else if (percent >= 80)    { message = "Khá tốt — bạn đang đi đúng hướng."; iconHTML = ICON_SPARK; iconClass = "mid"; }
        else if (percent >= 50)    { message = "Vượt qua mốc trung bình. Tiếp tục luyện thêm nhé."; iconHTML = ICON_TARGET; iconClass = "mid"; }
        else                       { message = "Cần ôn lại một chút. Đừng bỏ cuộc — học lại từ sai là cách nhanh nhất."; iconHTML = ICON_REFRESH; iconClass = "low"; }

        const container = document.getElementById('quizContainer');
        container.innerHTML = `
            <div class="milestone-screen">
                <div class="milestone-icon-wrap ${iconClass}">${iconHTML}</div>
                <div class="milestone-title">${isFinal ? 'Kết quả' : 'Checkpoint'}</div>
                <div class="milestone-score">${percent}<span class="pct">%</span></div>
                <p class="milestone-msg">${message}</p>
                ${percent < 50 ?
                    `<button class="action-btn" onclick="retryFailed()">Học lại từ sai</button>` :
                    (quizQueue.length > 0 ? `<button class="action-btn" onclick="resume()">Tiếp tục</button>` : '')
                }
                <button class="secondary-btn" onclick="closeQuiz()">${isFinal || (percent < 50 && wrongAnswerBuffer.length == 0) ? 'Về trang chính' : 'Dừng lại'}</button>
            </div>
        `;
    }

    function retryFailed() {
        if (wrongAnswerBuffer.length > 0) {
            quizQueue = [...wrongAnswerBuffer];
            wrongAnswerBuffer = [];
        } else {
            startQuiz(sessionStats.currentLimit);
            return;
        }
        sessionStats.correctInMilestone = 0;
        sessionStats.questionsInMilestone = 0;
        nextQuestion();
    }

    function resume() {
        sessionStats.correctInMilestone = 0;
        sessionStats.questionsInMilestone = 0;
        nextQuestion();
    }
</script>
