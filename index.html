<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#a8ccb6">
    <title>Vocab — Review Test 1 · IELTS Thầy Pháp</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* ============================================================
           VOCAB THEME — copied verbatim from VocabApp.jsx getTheme(false)
           ============================================================ */
        :root {
            --bg: #a8ccb6;
            --text: #0f172a;
            --text-sub: #2d3e36;
            --text-muted: #3d5248;
            --primary: #009040;
            --primary-light: #16a34a;
            --primary-dark: #0d3d1f;
            --accent: #f59e0b;
            --accent-light: #fbbf24;
            --surface: #ffffff;
            --surface-elevated: #eef3f0;
            --border: rgba(0, 80, 40, 0.10);
            --border-strong: rgba(0, 144, 64, 0.25);
            --success: #10b981;
            --danger: #dc2626;
            --shadow: rgba(0, 60, 30, 0.08);
            --card-shadow: 0 4px 20px rgba(0, 60, 30, 0.10);
            --card-shadow-hover: 0 8px 28px rgba(0, 60, 30, 0.16);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Plus Jakarta Sans', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.55;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ============================================================
           SPLASH — audio unlocker
           ============================================================ */
        #audioUnlocker {
            position: fixed; inset: 0;
            background: var(--bg);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; text-align: center; padding: 24px;
        }
        .splash-mark { width: 84px; height: 84px; margin-bottom: 18px; }
        .splash-eyebrow {
            font-size: 11px; font-weight: 700;
            color: var(--primary-dark);
            letter-spacing: 0.14em; text-transform: uppercase;
            margin-bottom: 10px;
            opacity: 0.85;
        }
        .splash-eyebrow .accent { color: #c2590a; }
        .splash-title {
            font-size: clamp(28px, 7vw, 42px);
            font-weight: 800; color: var(--primary-dark);
            letter-spacing: -0.025em; line-height: 1.05;
            margin-bottom: 8px;
        }
        .splash-sub {
            font-size: 15px; color: var(--text-sub);
            margin-bottom: 32px; font-weight: 500;
        }
        .unlock-btn {
            background: var(--primary); color: #fff;
            padding: 14px 36px; border-radius: 12px;
            font-weight: 700; border: none; cursor: pointer;
            font-size: 15px; font-family: inherit;
            letter-spacing: 0.01em;
            box-shadow: 0 4px 16px rgba(0, 144, 64, 0.32);
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }
        .unlock-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(0, 144, 64, 0.42);
        }

        /* ============================================================
           OUTER (va-outer pattern from VocabApp)
           ============================================================ */
        .va-outer {
            padding: 12px 12px 80px;
        }
        @media (min-width: 600px) {
            .va-outer { max-width: 1400px; margin: 0 auto; padding: 16px 16px 80px; }
        }

        /* ============================================================
           HEADER — verbatim pattern from VocabApp.jsx:1297
           ============================================================ */
        .va-header {
            display: flex; align-items: center; gap: 12px;
            margin-bottom: 16px; padding-bottom: 16px;
            border-bottom: 2px solid var(--border);
        }
        .header-icon-btn {
            padding: 7px 12px; border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.7);
            background: transparent;
            color: var(--text-sub);
            cursor: pointer; flex-shrink: 0;
            font-family: inherit;
            display: inline-flex; align-items: center; justify-content: center;
            transition: background 0.15s;
        }
        .header-icon-btn:hover { background: rgba(255, 255, 255, 0.3); }
        .header-icon-btn svg { width: 16px; height: 16px; }

        .va-title {
            font-size: clamp(20px, 4vw, 28px);
            font-weight: 700;
            color: var(--primary-dark);
            letter-spacing: -0.4px;
            display: flex; align-items: center; gap: 6px;
            background: rgba(255, 255, 255, 0.5);
            border: 1.5px solid rgba(255, 255, 255, 0.8);
            padding: 4px 12px;
            border-radius: 10px;
        }
        .va-title svg { width: 22px; height: 22px; flex-shrink: 0; }

        .va-back-btn {
            margin-left: auto;
            display: flex; align-items: center; gap: 6px;
            padding: 7px 14px; border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.7);
            background: transparent;
            color: var(--text-sub);
            font-size: 13px; font-weight: 600;
            cursor: pointer; font-family: inherit;
            flex-shrink: 0;
            transition: background 0.15s;
        }
        .va-back-btn:hover { background: rgba(255, 255, 255, 0.3); }
        .va-back-text { display: none; }
        @media (min-width: 600px) { .va-back-text { display: inline; } }

        /* ============================================================
           REC BAR — copied from VocabApp.jsx:1341
           ============================================================ */
        .va-rec-bar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 18px;
            border-radius: 14px;
            background: var(--surface);
            border: 2px solid var(--primary);
            box-shadow: 0 4px 20px rgba(0, 144, 64, 0.12), 0 0 0 1px rgba(0, 144, 64, 0.06);
            gap: 12px;
            margin-bottom: 16px;
            animation: rec-pulse 3s ease-in-out infinite;
        }
        @keyframes rec-pulse {
            0%, 100% { box-shadow: 0 4px 20px rgba(0, 144, 64, 0.12), 0 0 0 2px rgba(0, 144, 64, 0.08); }
            50%      { box-shadow: 0 4px 28px rgba(0, 144, 64, 0.25), 0 0 0 4px rgba(0, 144, 64, 0.15); }
        }
        .va-rec-bar .rec-eyebrow {
            font-size: 11px; font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.01em;
            color: #15803d;
            margin-bottom: 2px;
            display: flex; align-items: center; gap: 4px;
        }
        .va-rec-bar .rec-eyebrow svg { width: 12px; height: 12px; }
        .va-rec-bar .rec-title {
            font-size: 14px; font-weight: 700; color: var(--text);
        }
        .va-rec-bar .rec-cta {
            padding: 10px 20px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 13px; font-weight: 700;
            cursor: pointer; white-space: nowrap;
            font-family: inherit;
            box-shadow: 0 2px 8px rgba(0, 144, 64, 0.25);
            display: inline-flex; align-items: center; gap: 6px;
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .va-rec-bar .rec-cta:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(0, 144, 64, 0.35);
        }
        .va-rec-bar .rec-cta svg { width: 14px; height: 14px; }

        /* ============================================================
           VOICE SELECT — secondary control row
           ============================================================ */
        .voice-row {
            display: flex; align-items: center; gap: 8px;
            margin-bottom: 16px;
        }
        .voice-row .voice-label {
            font-size: 12px; font-weight: 700;
            color: var(--text-sub);
            letter-spacing: 0.04em;
            flex-shrink: 0;
        }
        .voice-wrap { flex: 1; position: relative; }
        .voice-wrap::after {
            content: '';
            position: absolute; right: 12px; top: 50%;
            transform: translateY(-70%) rotate(45deg);
            width: 6px; height: 6px;
            border-right: 2px solid var(--text-sub);
            border-bottom: 2px solid var(--text-sub);
            pointer-events: none;
        }
        select#voiceSelect {
            width: 100%;
            padding: 8px 30px 8px 12px;
            border-radius: 10px;
            border: 1.5px solid var(--border);
            outline: none;
            font-size: 13px; font-family: inherit; font-weight: 600;
            color: var(--text); background: var(--surface);
            appearance: none; -webkit-appearance: none;
            cursor: pointer;
            box-shadow: var(--card-shadow);
        }
        select#voiceSelect:focus { border-color: var(--primary); }

        /* ============================================================
           WORD GRID — copied from VocabApp.jsx:1834 / .va-word-grid
           ============================================================ */
        .va-word-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 10px;
            animation: fadeIn 0.4s ease-out;
        }
        @media (min-width: 600px) {
            .va-word-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
                gap: 14px;
            }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes cardAppear {
            from { opacity: 0; transform: translateY(8px) scale(0.99); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        .va-word-card {
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: 14px;
            padding: 16px 14px;
            cursor: pointer;
            transition: all 0.15s;
            box-shadow: var(--card-shadow);
            text-align: center;
            position: relative;
            min-height: 90px;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
            animation: cardAppear 280ms ease-out both;
        }
        .va-word-grid > .va-word-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--card-shadow-hover);
            border-color: var(--border-strong);
        }
        .va-word-card .card-word {
            font-size: 15px; font-weight: 700;
            color: var(--text); line-height: 1.3;
        }
        @media (min-width: 600px) {
            .va-word-card .card-word { font-size: 15px; }
        }

        /* ============================================================
           WORD MODAL — bottom sheet, copied from VocabApp.jsx:2060
           ============================================================ */
        #modalBackdrop {
            position: fixed; inset: 0;
            background: rgba(0, 0, 0, 0.35);
            opacity: 0;
            transition: opacity 0.25s ease;
            z-index: 99; pointer-events: none;
        }
        #modalBackdrop.active { opacity: 1; pointer-events: auto; }

        .va-word-modal {
            position: fixed;
            left: 0; right: 0; bottom: 0;
            background: var(--surface);
            border-radius: 24px 24px 0 0;
            box-shadow: 0 -8px 40px rgba(0, 0, 0, 0.15);
            transform: translateY(100%);
            transition: transform 0.32s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100;
            max-height: 90vh;
            display: flex; flex-direction: column;
        }
        .va-word-modal.active { transform: translateY(0); }

        .modal-top {
            padding: 12px 16px 8px;
            flex-shrink: 0;
        }
        .drag-handle {
            width: 40px; height: 4px;
            background: var(--border);
            border-radius: 2px;
            margin: 0 auto 8px;
        }
        .modal-top-row {
            display: flex; align-items: center; justify-content: flex-end;
        }
        .modal-close {
            width: 36px; height: 36px;
            border-radius: 50%;
            border: 1.5px solid var(--border);
            background: var(--surface-elevated);
            cursor: pointer;
            font-size: 20px;
            display: flex; align-items: center; justify-content: center;
            color: var(--text);
            font-family: inherit;
        }
        .modal-close:hover { background: var(--border); }

        .modal-body {
            flex: 1; min-width: 0;
            overflow-y: auto;
            padding: 0 20px 32px;
            text-align: left;
        }

        .va-word-head {
            display: flex; gap: 14px; align-items: stretch;
            margin-bottom: 12px;
        }
        .va-word-left {
            flex: 0 0 50%;
            padding-right: 14px;
            border-right: 2px solid rgba(0, 80, 40, 0.28);
        }
        .va-word-left-inner {
            display: flex; align-items: flex-start;
            gap: 10px; margin-bottom: 6px;
            justify-content: flex-end;
        }
        .speaker-btn {
            flex-shrink: 0;
            width: 32px; height: 32px;
            border-radius: 50%;
            border: none;
            background: var(--primary);
            color: white;
            cursor: pointer;
            margin-top: 2px;
            display: inline-flex; align-items: center; justify-content: center;
            padding: 0;
            box-shadow: 0 2px 6px rgba(0, 144, 64, 0.3);
        }
        .speaker-btn:hover { background: var(--primary-light); }
        .speaker-btn svg { width: 14px; height: 14px; }
        .word-meta { display: inline-flex; flex-direction: column; min-width: 0; }
        .word-h2 {
            font-size: clamp(20px, 4.2vw, 28px);
            font-weight: 800; line-height: 1.1;
            margin: 0 0 4px;
            color: var(--text);
            overflow-wrap: break-word; word-break: break-word;
            text-align: right;
        }
        .word-ipa {
            font-size: 14px; font-weight: 600;
            color: var(--primary-light);
            letter-spacing: 0.3px;
            text-align: right;
        }
        .va-word-right {
            flex: 1; padding-left: 4px;
        }
        .word-meaning {
            font-size: 20px; font-weight: 700;
            color: var(--text);
            margin: 0 0 6px;
            line-height: 1.25;
        }

        .word-paraphrase {
            font-size: 15px; line-height: 1.65;
            margin: 8px 0;
            background: var(--surface-elevated);
            padding: 11px 16px;
            border-radius: 10px;
            border-left: 3px solid var(--accent);
            color: var(--text);
            opacity: 0.92;
        }
        .word-paraphrase strong { color: var(--primary-dark); }

        .word-collo {
            font-size: 14px;
            margin: 8px 0;
            padding: 11px 16px;
            background: rgba(0, 144, 64, 0.06);
            border-radius: 10px;
            border-left: 3px solid var(--primary);
            color: var(--text-sub);
            line-height: 1.5;
        }
        .word-collo strong { color: var(--primary-dark); font-weight: 700; }

        /* ============================================================
           QUIZ OVERLAY
           ============================================================ */
        #quizOverlay {
            position: fixed; inset: 0;
            background: rgba(13, 61, 31, 0.75);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            display: none;
            align-items: center; justify-content: center;
            z-index: 1000; padding: 12px;
        }
        .quiz-container {
            background: var(--surface);
            width: 100%; max-width: 540px;
            padding: 28px 22px 18px;
            border-radius: 20px;
            position: relative; overflow: hidden;
            min-height: 520px;
            display: flex; flex-direction: column;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .timer-bar {
            position: absolute; top: 0; left: 0;
            height: 4px;
            background: var(--primary);
            width: 100%;
            transition: width 1s linear;
        }

        .quiz-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 18px;
            font-size: 11px; color: var(--text-muted); font-weight: 700;
            letter-spacing: 0.1em; text-transform: uppercase;
            font-variant-numeric: tabular-nums;
        }

        #questionType {
            font-size: 10px; font-weight: 800;
            color: var(--primary);
            margin-bottom: 14px;
            text-transform: uppercase;
            letter-spacing: 0.14em;
        }

        .question-text {
            font-size: 1.05rem;
            font-weight: 700;
            margin-bottom: 16px;
            color: var(--text);
            min-height: 96px;
            display: flex; align-items: center; justify-content: center;
            padding: 0 6px;
            line-height: 1.45;
            text-align: center;
        }

        .hint-text {
            background: rgba(245, 158, 11, 0.10);
            border-left: 3px solid var(--accent);
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 18px;
            color: var(--text-sub); font-weight: 600;
            line-height: 1.4;
        }

        .opt-btn {
            display: block; width: 100%;
            padding: 14px 16px; margin: 8px 0;
            border: 1.5px solid var(--border);
            border-radius: 12px;
            background: var(--surface);
            cursor: pointer; font-family: inherit; font-weight: 600;
            transition: border-color 0.15s, background 0.15s, transform 0.1s;
            font-size: 15px;
            color: var(--text);
            text-align: left;
            line-height: 1.4;
        }
        .opt-btn:hover { border-color: var(--primary); background: var(--surface-elevated); }
        .opt-btn:active { transform: scale(0.98); }
        .opt-btn.correct {
            background: var(--primary) !important;
            color: #fff !important;
            border-color: var(--primary);
            box-shadow: 0 4px 14px rgba(0, 144, 64, 0.30);
        }
        .opt-btn.wrong {
            background: var(--danger) !important;
            color: #fff !important;
            border-color: var(--danger);
            box-shadow: 0 4px 14px rgba(220, 38, 38, 0.28);
        }

        .btn-stop {
            margin-top: auto;
            align-self: center;
            border: none; background: none;
            color: var(--text-muted); font-weight: 700;
            font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
            cursor: pointer; padding: 14px;
            font-family: inherit;
        }
        .btn-stop:hover { color: var(--text); }

        /* ============================================================
           MILESTONE
           ============================================================ */
        .milestone-screen {
            padding: 12px 4px;
            text-align: center;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            flex: 1;
        }
        .milestone-icon-wrap {
            width: 72px; height: 72px;
            display: inline-flex; align-items: center; justify-content: center;
            border-radius: 20px;
            margin-bottom: 10px;
        }
        .milestone-icon-wrap.win { background: rgba(0, 144, 64, 0.10); color: var(--primary); }
        .milestone-icon-wrap.mid { background: rgba(245, 158, 11, 0.12); color: var(--accent); }
        .milestone-icon-wrap.low { background: rgba(220, 38, 38, 0.10); color: var(--danger); }
        .milestone-icon-wrap svg { width: 38px; height: 38px; }

        .milestone-title {
            font-size: 11px; font-weight: 800;
            color: var(--text-muted);
            letter-spacing: 0.16em; text-transform: uppercase;
            margin-bottom: 4px;
        }
        .milestone-score {
            font-size: 88px; font-weight: 800;
            color: var(--text);
            margin: 6px 0;
            letter-spacing: -0.04em;
            line-height: 1;
            font-variant-numeric: tabular-nums;
        }
        .milestone-score .pct {
            font-size: 28px; font-weight: 700;
            color: var(--text-muted);
            margin-left: 2px;
            vertical-align: top;
            position: relative; top: 14px;
        }
        .milestone-msg {
            font-weight: 600; color: var(--text-sub);
            margin-bottom: 24px;
            font-size: 15px;
            padding: 0 14px; line-height: 1.5;
            max-width: 380px;
        }

        .action-btn {
            background: var(--primary); color: #fff;
            border: none;
            padding: 14px 28px;
            border-radius: 12px;
            font-weight: 700; cursor: pointer;
            width: 100%; margin-top: 8px;
            font-size: 15px;
            letter-spacing: 0.01em;
            font-family: inherit;
            box-shadow: 0 4px 16px rgba(0, 144, 64, 0.28);
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .action-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(0, 144, 64, 0.38); }
        .secondary-btn {
            background: transparent;
            color: var(--text-sub);
            border: 1.5px solid var(--border);
            padding: 12px 28px; border-radius: 12px;
            font-weight: 700; cursor: pointer;
            width: 100%; margin-top: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.15s, color 0.15s;
        }
        .secondary-btn:hover { color: var(--text); border-color: var(--primary); }

        /* ============================================================
           MODE SELECTION
           ============================================================ */
        .mode-title {
            font-size: 22px; font-weight: 800;
            color: var(--text);
            letter-spacing: -0.02em;
            margin-bottom: 4px;
        }
        .mode-sub {
            font-size: 13px;
            color: var(--text-sub);
            margin-bottom: 22px;
            font-weight: 500;
        }
        .mode-grid { display: flex; flex-direction: column; gap: 10px; width: 100%; }
        .mode-btn {
            border: 1.5px solid var(--border);
            border-radius: 14px;
            background: var(--surface);
            padding: 12px 14px;
            font-family: inherit; font-weight: 700;
            font-size: 15px; color: var(--text);
            cursor: pointer;
            display: flex; align-items: center; gap: 14px;
            transition: border-color 0.15s, background 0.15s, transform 0.1s;
            text-align: left;
            box-shadow: var(--card-shadow);
        }
        .mode-btn:hover { border-color: var(--primary); background: var(--surface-elevated); transform: translateY(-1px); }
        .mode-btn .mode-num {
            width: 40px; height: 40px;
            display: inline-flex; align-items: center; justify-content: center;
            border-radius: 10px;
            background: rgba(0, 144, 64, 0.10);
            color: var(--primary-dark);
            font-weight: 800;
            font-size: 14px;
            font-variant-numeric: tabular-nums;
            flex-shrink: 0;
            letter-spacing: -0.01em;
        }
        .mode-btn .mode-label { flex: 1; line-height: 1.2; }
        .mode-btn .mode-label small {
            display: block;
            font-size: 10px; font-weight: 700;
            color: var(--text-muted);
            margin-top: 2px;
            letter-spacing: 0.1em; text-transform: uppercase;
        }
        .mode-btn .mode-arrow {
            color: var(--text-muted);
            flex-shrink: 0;
        }

        .cancel-btn {
            margin-top: 18px;
            color: var(--text-muted);
            background: none; border: none;
            cursor: pointer; font-weight: 700;
            font-family: inherit;
            font-size: 11px;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            padding: 10px;
        }
        .cancel-btn:hover { color: var(--text); }
    </style>
</head>
<body>

<div id="audioUnlocker">
    <svg class="splash-mark" viewBox="0 0 64 64" aria-hidden="true">

<script>
    const synth = window.speechSynthesis;
    let allowedVoices = [];

    const VOCAB_DATA = {
        "to diversify": { ipa: "/daɪˈvɜː.sɪ.faɪ/", meaning: "đa dạng hóa", def: "to make or become more varied in form, range, or activities", syn: ["branch out"], collo: "diversify the portfolio", sentence: "The company needs to ________ its product range to survive." },
        "to generate income": { ipa: "/ˈdʒen.ə.reɪt ˈɪŋ.kʌm/", meaning: "tạo ra thu nhập", def: "to produce money that is earned from work, business, or investments", syn: ["earn money"], collo: "strategies to generate income", sentence: "Selling assets is one way to ________ in the short term." },
        "commercial revenues": { ipa: "/kəˈmɜː.ʃəl ˈrev.ə.njuːz/", meaning: "doanh thu thương mại", def: "the income that a company or organization gets from selling goods or services", syn: ["sales turnover"], collo: "increase commercial revenues", sentence: "The airport's ________ have doubled since the renovation." },
        "a combination of factors": { ipa: "/ə ˌkɒm.bɪˈneɪ.ʃən əv ˈfæk.təz/", meaning: "một tổ hợp các yếu tố", def: "a number of different things that work together to cause a result", syn: ["mix of elements"], collo: "due to a combination of factors", sentence: "The project failed because of ________, including bad timing." },
        "restrictions on sales": { ipa: "/rɪˈstrɪk.ʃənz ɒn seɪlz/", meaning: "các hạn chế về mặt hàng bán", def: "limits or controls on what can be sold", syn: ["trade barriers"], collo: "impose restrictions on sales", sentence: "The government has lifted some ________ of tobacco." },
        "security procedures": { ipa: "/sɪˈkjʊə.rə.ti prəˈsiː.dʒəz/", meaning: "các quy trình an ninh", def: "official or accepted ways of doing something to keep people and places safe", syn: ["safety protocols"], collo: "follow security procedures", sentence: "Strict ________ are in place at every entrance." },
        "dwell time": { ipa: "/ˈdwel ˌtaɪm/", meaning: "thời gian lưu lại", def: "the amount of time someone spends in a particular place", syn: ["waiting time"], collo: "increase passenger dwell time", sentence: "Retailers aim to increase ________ to boost sales." },
        "global economic downturn": { ipa: "/ˈɡləʊ.bəl ˌek.əˈnɒm.ɪk ˈdaʊn.tɜːn/", meaning: "sự suy thoái kinh tế toàn cầu", def: "a period when the economy of the world is doing badly", syn: ["world recession"], collo: "survive the global economic downturn", sentence: "Many small businesses went bankrupt during the last ________." },
        "aeronautical revenues": { ipa: "/ˌeə.rəˈnɔː.tɪ.kəl ˈrev.ə.njuːz/", meaning: "doanh thu hàng không", def: "money earned from activities related to aircraft and air travel", syn: ["aviation income"], collo: "primary aeronautical revenues", sentence: "Landing fees are a major part of ________ for airports." },
        "financial health": { ipa: "/faɪˈnæn.ʃəl helθ/", meaning: "tình hình tài chính", def: "the state of a company's or person's financial situation", syn: ["fiscal condition"], collo: "assess the financial health", sentence: "The audit confirmed the long-term ________ of the organization." },
        "low-cost carrier sector": { ipa: "/ˌləʊˈkɒst ˈkæ.ri.ə ˈsek.tər/", meaning: "khu vực hàng không giá rẻ", def: "the part of the airline industry that offers cheap flights", syn: ["budget airline industry"], collo: "growth in the low-cost carrier sector", sentence: "The ________ has transformed how people travel across Europe." },
        "merchandising space": { ipa: "/ˈmɜː.tʃən.daɪ.zɪŋ speɪs/", meaning: "không gian bán hàng", def: "the area used for selling goods, especially related to a brand", syn: ["retail area"], collo: "allocate merchandising space", sentence: "We need more ________ for the new summer collection." },
        "a radical solution": { ipa: "/ə ˈræd.ɪ.kəl səˈluː.ʃən/", meaning: "một giải pháp triệt để", def: "a new and very different way of solving a problem", syn: ["drastic measure"], collo: "propose a radical solution", sentence: "The board is considering ________ to the debt crisis." },
        "an array of": { ipa: "/ən əˈreɪ əv/", meaning: "một loạt, một dãy", def: "a large number or wide range of different things", syn: ["a variety of"], collo: "an array of options", sentence: "The shop offers ________ handmade crafts." },
        "to take on the role of": { ipa: "/tu ˈteɪk ɒn ðə rəʊl əv/", meaning: "đảm nhận vai trò", def: "to start doing a particular job or function", syn: ["act as"], collo: "take on the role of leader", sentence: "She was asked to ________ acting manager." },
        "a facilitator of access": { ipa: "/ə fəˈsɪl.ɪ.teɪ.tər əv ˈæk.ses/", meaning: "người tạo điều kiện tiếp cận", def: "something that makes it easier to get to a place or use a service", syn: ["access provider"], collo: "act as a facilitator of access", sentence: "The new bridge serves as ________ to the remote island." },
        "a final destination": { ipa: "/ə ˈfaɪ.nəl ˌdes.tɪˈneɪ.ʃən/", meaning: "điểm đến cuối cùng", def: "the place where someone is going to, at the end of a trip", syn: ["end point"], collo: "reach the final destination", sentence: "After three flights, we finally reached our ________." },
        "dedicated facilities": { ipa: "/ˈded.ɪ.keɪ.tɪd fəˈsɪl.ə.tiz/", meaning: "cơ sở vật chất chuyên dụng", def: "buildings, equipment, or services intended for a particular purpose", syn: ["customized infrastructure"], collo: "invest in dedicated facilities", sentence: "The hospital has ________ for cancer treatment." },
        "to reconvert": { ipa: "/ˌriː.kənˈvɜːt/", meaning: "chuyển đổi lại", def: "to change something back to a different form or use", syn: ["transform back"], collo: "reconvert old warehouses", sentence: "They plan to ________ the old cinema into a theater." },
        "underused areas": { ipa: "/ˌʌn.dəˈjuːzd ˈeə.ri.əz/", meaning: "khu vực chưa hết công suất", def: "spaces or places that are not used as much as they could be", syn: ["idle spaces"], collo: "utilize underused areas", sentence: "The city is trying to turn ________ into community gardens." },
        "a business venue": { ipa: "/ə ˈbɪz.nɪs ˈven.juː/", meaning: "địa điểm kinh doanh", def: "a place used for business meetings or events", syn: ["meeting location"], collo: "book a business venue", sentence: "This hotel is the premier ________ in the city center." },
        "to retain airlines": { ipa: "/tu rɪˈteɪn ˈeə.laɪnz/", meaning: "giữ chân các hãng hàng không", def: "to keep airlines using an airport's services", syn: ["keep carriers"], collo: "efforts to retain airlines", sentence: "Lowering landing fees is crucial to ________." },
        "a determining factor": { ipa: "/ə dɪˈtɜː.mɪ.nɪŋ ˈfæk.tər/", meaning: "yếu tố quyết định", def: "something that controls or decides the result of a situation", syn: ["decisive element"], collo: "the main determining factor", sentence: "Price is often the ________ when choosing a supplier." },
        "financial prospects": { ipa: "/faɪˈnæn.ʃəl ˈprɒs.pekts/", meaning: "triển vọng tài chính", def: "the possibility of success or profit in the future", syn: ["economic outlook"], collo: "bright financial prospects", sentence: "The new partnership has improved our ________." },
        "competitive advantage": { ipa: "/kəmˈpet.ɪ.tɪv ədˈvɑːn.tɪdʒ/", meaning: "lợi thế cạnh tranh", def: "a condition that makes a company more successful than others", syn: ["competitive edge"], collo: "gain a competitive advantage", sentence: "Our unique technology gives us a huge ________." },
        "a commercial venture": { ipa: "/ə kəˈmɜː.ʃəl ˈven.tʃər/", meaning: "một dự án thương mại", def: "a business project or activity, especially one involving risk", syn: ["business enterprise"], collo: "launch a commercial venture", sentence: "The first ________ in space tourism has begun." },
        "stakeholders": { ipa: "/ˈsteɪkˌhəʊl.dəz/", meaning: "các bên liên quan", def: "people or groups with an interest in the success of an organization", syn: ["interested parties"], collo: "consult all stakeholders", sentence: "The company must consider the needs of all its ________." },
        "local orientation": { ipa: "/ˈləʊ.kəl ˌɔː.ri.enˈteɪ.ʃən/", meaning: "định hướng địa phương", def: "a focus on serving the needs of the nearby community", syn: ["regional focus"], collo: "strong local orientation", sentence: "The bank maintains a ________ despite being a global brand." },
        "to be of limited importance": { ipa: "/tu bi əv ˈlɪm.ɪ.tɪd ɪmˈpɔː.təns/", meaning: "có tầm quan trọng hạn chế", def: "to not be very significant or influential", syn: ["insignificant"], collo: "considered to be of limited importance", sentence: "The minor error was ________ to the overall result." },
        "runner-up": { ipa: "/ˌrʌn.ərˈʌp/", meaning: "người/vật về nhì", def: "a person or team that finishes second in a race or competition", syn: ["second-place finisher"], collo: "finish as runner-up", sentence: "He was the ________ in the national chess championship." }
    };

    // ────────────────────────────────────────────────────────────
    // Reusable SVG strings
    // ────────────────────────────────────────────────────────────
    const SPEAKER_SVG = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>';
    const ARROW_RIGHT_SVG = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>';
    const ICON_TROPHY  = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 21h8M12 17v4M7 4h10v5a5 5 0 0 1-10 0V4zM7 7H4v2a3 3 0 0 0 3 3M17 7h3v2a3 3 0 0 1-3 3"/></svg>';
    const ICON_SPARK   = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l2.4 6.4L21 11l-6.6 2.6L12 20l-2.4-6.4L3 11l6.6-2.6L12 2z"/></svg>';
    const ICON_TARGET  = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1.5" fill="currentColor"/></svg>';
    const ICON_REFRESH = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 15.5-6.3L21 8M21 3v5h-5M21 12a9 9 0 0 1-15.5 6.3L3 16M3 21v-5h5"/></svg>';

    let audioCtx = null;
    let quizQueue = [];
    let currentQuestion = null;
    let timerInterval = null;
    let timeLeft = 15;
    let wrongAnswerBuffer = [];
    let sessionStats = { correctInMilestone: 0, questionsInMilestone: 0, totalCorrect: 0, milestoneSize: 10, currentLimit: 10 };

    function playSound(type) {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        oscillator.connect(gainNode); gainNode.connect(audioCtx.destination);
        if (type === 'correct') {
            oscillator.frequency.setValueAtTime(880, audioCtx.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(1320, audioCtx.currentTime + 0.1);
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime); oscillator.start(); oscillator.stop(audioCtx.currentTime + 0.3);
        } else {
            oscillator.type = 'sawtooth'; oscillator.frequency.setValueAtTime(220, audioCtx.currentTime);
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime); oscillator.start(); oscillator.stop(audioCtx.currentTime + 0.4);
        }
    }

    function populateVoices() {
        const allVoices = synth.getVoices();
        allowedVoices = allVoices.filter(v =>
            (v.lang.includes('en-US') || v.lang.includes('en-GB')) &&
            !v.name.includes('David') &&
            !v.name.includes('Zira')
        );
        const select = document.getElementById('voiceSelect');
        if(!select) return;
        select.innerHTML = '';
        allowedVoices.forEach((v, i) => {
            const opt = document.createElement('option'); opt.value = i; opt.textContent = v.name;
            if (v.name.includes('Google') || v.name.includes('Natural')) opt.selected = true;
            select.appendChild(opt);
        });
    }

    if (speechSynthesis.onvoiceschanged !== undefined) speechSynthesis.onvoiceschanged = populateVoices;

    function startApp() {
        document.getElementById('audioUnlocker').style.display = 'none';
        document.getElementById('mainContent').style.display = 'block';
        populateVoices();
    }

    function speak(text) {
        synth.cancel();
        const ut = new SpeechSynthesisUtterance(text);
        if (allowedVoices.length > 0) {
            ut.voice = allowedVoices[document.getElementById('voiceSelect').value];
        }
        ut.rate = 0.85;
        synth.speak(ut);
    }

    // ────────────────────────────────────────────────────────────
    // Build word grid — matches VocabApp.jsx:1834 pattern
    // ────────────────────────────────────────────────────────────
    const grid = document.getElementById('vocabGrid');
    Object.entries(VOCAB_DATA).forEach(([word, info], idx) => {
        const card = document.createElement('div');
        card.className = 'va-word-card';
        card.style.animationDelay = (idx * 30) + 'ms';
        card.innerHTML = `<span class="card-word">${word}</span>`;
        card.onclick = () => openModal(word);
        grid.appendChild(card);
    });

    // ────────────────────────────────────────────────────────────
    // Modal — matches WordModal pattern from VocabApp.jsx:2060
    // ────────────────────────────────────────────────────────────
    function openModal(word) {
        const info = VOCAB_DATA[word];
        if (!info) return;
        const body = document.getElementById('modalBody');
        body.innerHTML = `
            <div class="va-word-head">
                <div class="va-word-left">
                    <div class="va-word-left-inner">
                        <button class="speaker-btn" aria-label="Phát âm" onclick="speak(${JSON.stringify(word)})">
                            ${SPEAKER_SVG}
                        </button>
                        <div class="word-meta">
                            <h2 class="word-h2">${word}</h2>
                            <span class="word-ipa">${info.ipa}</span>
                        </div>
                    </div>
                </div>
                <div class="va-word-right">
                    <div class="word-meaning">${info.meaning}</div>
                </div>
            </div>
            <div class="word-paraphrase">${info.def}</div>
            <div class="word-collo"><strong>Cụm thường gặp:</strong> ${info.collo}</div>
            <div class="word-collo"><strong>Ví dụ:</strong> ${info.sentence}</div>
        `;
        document.getElementById('modalBackdrop').classList.add('active');
        document.getElementById('wordModal').classList.add('active');
        speak(word);
    }
    function closeModal() {
        document.getElementById('modalBackdrop').classList.remove('active');
        document.getElementById('wordModal').classList.remove('active');
    }

    // ────────────────────────────────────────────────────────────
    // Quiz mode selection
    // ────────────────────────────────────────────────────────────
    function openModeSelection() {
        document.getElementById('quizOverlay').style.display = 'flex';
        const container = document.getElementById('quizContainer');
        const total = Object.keys(VOCAB_DATA).length;
        container.innerHTML = `
            <div class="milestone-screen">
                <div class="mode-title">Test trí nhớ</div>
                <div class="mode-sub">Chọn số lượng câu để bắt đầu</div>
                <div class="mode-grid">
                    <button class="mode-btn" onclick="startQuiz(10)">
                        <span class="mode-num">10</span>
                        <span class="mode-label">10 câu<small>Khởi động nhanh</small></span>
                        <span class="mode-arrow">${ARROW_RIGHT_SVG}</span>
                    </button>
                    <button class="mode-btn" onclick="startQuiz(20)">
                        <span class="mode-num">20</span>
                        <span class="mode-label">20 câu<small>Luyện chắc tay</small></span>
                        <span class="mode-arrow">${ARROW_RIGHT_SVG}</span>
                    </button>
                    <button class="mode-btn" onclick="startQuiz(${total})">
                        <span class="mode-num">${total}</span>
                        <span class="mode-label">Toàn bộ ${total} từ<small>Kiểm tra tổng quát</small></span>
                        <span class="mode-arrow">${ARROW_RIGHT_SVG}</span>
                    </button>
                </div>
                <button class="cancel-btn" onclick="closeQuiz()">Hủy bỏ</button>
            </div>
        `;
    }

    function startQuiz(limit) {
        sessionStats.currentLimit = limit;
        sessionStats.milestoneSize = limit;
        const allWords = Object.keys(VOCAB_DATA).sort(() => Math.random() - 0.5);
        quizQueue = allWords.slice(0, limit);
        wrongAnswerBuffer = [];
        sessionStats.correctInMilestone = 0;
        sessionStats.questionsInMilestone = 0;
        sessionStats.totalCorrect = 0;
        renderQuizBase(); nextQuestion();
    }

    function renderQuizBase() {
        document.getElementById('quizContainer').innerHTML = `
            <div class="timer-bar" id="timerBar"></div>
            <div class="quiz-header"><span id="quizProgress"></span><span id="quizTimer">15s</span></div>
            <div id="questionType"></div>
            <div class="question-text" id="question"></div>
            <div class="hint-text" id="hint"></div>
            <div id="optionsGrid"></div>
            <button class="btn-stop" onclick="closeQuiz()">Dừng chơi</button>
        `;
    }

    function closeQuiz() { clearInterval(timerInterval); document.getElementById('quizOverlay').style.display = 'none'; }

    function maskWord(str, target) {
        const cleanTarget = target.replace(/^to\s+/, '');
        const regex = new RegExp(cleanTarget, 'gi');
        return str.replace(regex, '_______');
    }

    function generateQuestionData(word) {
        const data = VOCAB_DATA[word];
        const types = ['meaning', 'def', 'collo', 'sentence'];
        const type = types[Math.floor(Math.random() * types.length)];
        let qText, dType;

        switch (type) {
            case 'meaning':
                dType = "Nghĩa của từ";
                qText = `Đâu là nghĩa tiếng Việt của cụm từ dưới đây?<br><span style="display:block; margin-top:12px; color:var(--primary-dark); font-size:1.2em;">"${word}"</span>`;
                break;
            case 'def':
                dType = "Định nghĩa tiếng Anh";
                qText = `"${data.def}"<br><br><small style="font-size:13px; color:var(--text-muted); font-weight:600;">Đây là định nghĩa của từ nào?</small>`;
                break;
            case 'collo':
                dType = "Cụm từ cố định";
                qText = `Điền từ còn thiếu vào cụm:<br><span style="display:block; margin-top:10px; font-style:italic; color:var(--text);">"${maskWord(data.collo, word)}"</span>`;
                break;
            case 'sentence':
                dType = "Ngữ cảnh thực tế";
                qText = `Hoàn thành câu sau:<br><span style="display:block; margin-top:10px; font-style:italic; color:var(--text);">"${maskWord(data.sentence, word)}"</span>`;
                break;
        }
        return { word, questionText: qText, hintText: `Gợi ý: ${data.meaning}`, correctAnswer: word, type: dType, originalType: type };
    }

    function nextQuestion() {
        if (sessionStats.questionsInMilestone >= sessionStats.milestoneSize && quizQueue.length > 0) return showMilestone();
        clearInterval(timerInterval);

        if (quizQueue.length === 0 && wrongAnswerBuffer.length > 0) quizQueue.push(wrongAnswerBuffer.shift().word);
        if (quizQueue.length === 0) return showMilestone(true);

        const word = quizQueue.shift();
        currentQuestion = generateQuestionData(word);
        document.getElementById('quizProgress').innerText = `Câu ${sessionStats.questionsInMilestone + 1} / ${sessionStats.milestoneSize}`;
        document.getElementById('questionType').innerText = currentQuestion.type;
        document.getElementById('question').innerHTML = currentQuestion.questionText;
        document.getElementById('hint').innerText = currentQuestion.hintText;

        const optionsGrid = document.getElementById('optionsGrid');
        optionsGrid.innerHTML = '';

        let options = [];
        if (currentQuestion.originalType === 'meaning') {
            options = [VOCAB_DATA[word].meaning];
            let distractors = Object.values(VOCAB_DATA)
                .filter(v => v.meaning !== VOCAB_DATA[word].meaning)
                .sort(() => Math.random() - 0.5)
                .slice(0, 2)
                .map(v => v.meaning);
            options.push(...distractors);
        } else {
            options = [word];
            let distractors = Object.keys(VOCAB_DATA)
                .filter(w => w !== word && !currentQuestion.questionText.toLowerCase().includes(w.toLowerCase()))
                .sort(() => Math.random() - 0.5)
                .slice(0, 2);
            options.push(...distractors);
        }

        options.sort(() => Math.random() - 0.5);

        options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'opt-btn'; btn.innerText = opt;
            btn.onclick = () => {
                clearInterval(timerInterval);
                document.querySelectorAll('.opt-btn').forEach(b => b.style.pointerEvents = 'none');

                const isCorrect = (currentQuestion.originalType === 'meaning') ? (opt === VOCAB_DATA[word].meaning) : (opt === word);

                if (isCorrect) {
                    btn.classList.add('correct'); sessionStats.totalCorrect++; sessionStats.correctInMilestone++; playSound('correct');
                } else {
                    btn.classList.add('wrong'); playSound('wrong');
                    document.querySelectorAll('.opt-btn').forEach(b => {
                        if ((currentQuestion.originalType === 'meaning' && b.innerText === VOCAB_DATA[word].meaning) || b.innerText === word)
                            b.classList.add('correct');
                    });
                    wrongAnswerBuffer.push({ word: word });
                }
                sessionStats.questionsInMilestone++;
                setTimeout(nextQuestion, 1400);
            };
            optionsGrid.appendChild(btn);
        });
        startTimer();
    }

    function startTimer() {
        timeLeft = 15;
        const bar = document.getElementById('timerBar');
        if (bar) bar.style.width = '100%';
        timerInterval = setInterval(() => {
            timeLeft--;
            const timerEl = document.getElementById('quizTimer');
            const barEl = document.getElementById('timerBar');
            if (timerEl) timerEl.innerText = timeLeft + "s";
            if (barEl) barEl.style.width = (timeLeft / 15 * 100) + "%";
            if (timeLeft <= 0) { clearInterval(timerInterval); nextQuestion(); }
        }, 1000);
    }

    function showMilestone(isFinal = false) {
        const total = isFinal ? sessionStats.questionsInMilestone : sessionStats.milestoneSize;
        const correct = sessionStats.correctInMilestone;
        const percent = Math.round((correct / total) * 100);

        let message = "", iconHTML = "", iconClass = "mid";
        if (percent === 100) {
            message = "Hoàn hảo! Bạn nắm chắc cả 30 từ rồi đó.";
            iconHTML = ICON_TROPHY; iconClass = "win";
        } else if (percent >= 90) {
            message = "Gần như hoàn hảo. Một chút nữa thôi.";
            iconHTML = ICON_SPARK; iconClass = "win";
        } else if (percent >= 80) {
            message = "Khá tốt — bạn đang đi đúng hướng.";
            iconHTML = ICON_SPARK; iconClass = "mid";
        } else if (percent >= 50) {
            message = "Vượt qua mốc trung bình. Tiếp tục luyện thêm nhé.";
            iconHTML = ICON_TARGET; iconClass = "mid";
        } else {
            message = "Cần ôn lại một chút. Đừng bỏ cuộc — học lại từ sai là cách nhanh nhất.";
            iconHTML = ICON_REFRESH; iconClass = "low";
        }

        const container = document.getElementById('quizContainer');
        container.innerHTML = `
            <div class="milestone-screen">
                <div class="milestone-icon-wrap ${iconClass}">${iconHTML}</div>
                <div class="milestone-title">${isFinal ? 'Kết quả' : 'Checkpoint'}</div>
                <div class="milestone-score">${percent}<span class="pct">%</span></div>
                <p class="milestone-msg">${message}</p>

                ${percent < 50 ?
                    `<button class="action-btn" onclick="retryFailed()">Học lại từ sai</button>` :
                    (quizQueue.length > 0 ? `<button class="action-btn" onclick="resume()">Tiếp tục</button>` : '')
                }

                <button class="secondary-btn" onclick="closeQuiz()">${isFinal || (percent < 50 && wrongAnswerBuffer.length == 0) ? 'Về trang chính' : 'Dừng lại'}</button>
            </div>
        `;
    }

    function retryFailed() {
        if (wrongAnswerBuffer.length > 0) {
            quizQueue = wrongAnswerBuffer.map(i => i.word);
            wrongAnswerBuffer = [];
        } else {
            startQuiz(sessionStats.currentLimit);
            return;
        }
        sessionStats.correctInMilestone = 0;
        sessionStats.questionsInMilestone = 0;
        renderQuizBase(); nextQuestion();
    }

    function resume() {
        sessionStats.correctInMilestone = 0;
        sessionStats.questionsInMilestone = 0;
        renderQuizBase(); nextQuestion();
    }
</script>
</body>
</html>
