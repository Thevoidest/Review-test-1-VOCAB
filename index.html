<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#a8ccb6">
    <title>Vocab Garden — Review Test 1 · IELTS Thầy Pháp</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #a8ccb6;
            --text: #0f172a;
            --text-sub: #2d3e36;
            --text-muted: #3d5248;
            --primary: #009040;
            --primary-light: #16a34a;
            --primary-dark: #0d3d1f;
            --accent: #f59e0b;
            --surface: #ffffff;
            --surface-elevated: #eef3f0;
            --border: rgba(0, 80, 40, 0.10);
            --border-strong: rgba(0, 144, 64, 0.25);
            --tab-track: rgba(255, 255, 255, 0.45);
            --tab-face: #ffffff;
            --shadow: rgba(0, 60, 30, 0.08);
            --card-shadow: 0 4px 20px rgba(0, 60, 30, 0.10);
            --card-shadow-hover: 0 8px 28px rgba(0, 60, 30, 0.16);
            --success: #16a34a;
            --success-soft: #dcfce7;
            --danger: #dc2626;
            --danger-soft: #fee2e2;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
            background: var(--bg); color: var(--text);
            line-height: 1.55; min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* SPLASH */
        #audioUnlocker {
            position: fixed; inset: 0; background: var(--bg);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; text-align: center; padding: 24px;
        }
        .splash-mark { width: 84px; height: 84px; margin-bottom: 18px; }
        .splash-eyebrow {
            font-size: 11px; font-weight: 700; color: var(--primary-dark);
            letter-spacing: 0.14em; text-transform: uppercase;
            margin-bottom: 10px; opacity: 0.85;
        }
        .splash-eyebrow .accent { color: #c2590a; }
        .splash-title {
            font-size: clamp(28px, 7vw, 42px);
            font-weight: 800; color: var(--primary-dark);
            letter-spacing: -0.025em; line-height: 1.05; margin-bottom: 8px;
        }
        .splash-sub { font-size: 15px; color: var(--text-sub); margin-bottom: 32px; font-weight: 500; }
        .unlock-btn {
            background: var(--primary); color: #fff;
            padding: 14px 36px; border-radius: 12px;
            font-weight: 700; border: none; cursor: pointer;
            font-size: 15px; font-family: inherit; letter-spacing: 0.01em;
            box-shadow: 0 4px 16px rgba(0, 144, 64, 0.32);
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .unlock-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(0, 144, 64, 0.42); }

        /* OUTER */
        .va-outer { padding: 12px 12px 80px; }
        @media (min-width: 600px) {
            .va-outer { max-width: 1400px; margin: 0 auto; padding: 16px 16px 80px; }
        }

        /* HEADER */
        .va-header {
            display: flex; align-items: center; gap: 12px;
            margin-bottom: 16px; padding-bottom: 16px;
            border-bottom: 2px solid var(--border);
        }
        .va-title {
            font-size: clamp(20px, 4vw, 28px);
            font-weight: 700; color: var(--primary-dark);
            letter-spacing: -0.4px;
            display: flex; align-items: center; gap: 6px;
            background: rgba(255, 255, 255, 0.5);
            border: 1.5px solid rgba(255, 255, 255, 0.8);
            padding: 4px 12px; border-radius: 10px;
        }
        .va-title svg { width: 22px; height: 22px; flex-shrink: 0; }
        .va-sub {
            margin-left: auto;
            font-size: 12px; font-weight: 700;
            color: var(--text-sub);
            letter-spacing: 0.01em;
            background: rgba(255, 255, 255, 0.35);
            border: 1px solid rgba(255, 255, 255, 0.6);
            padding: 4px 10px; border-radius: 8px;
        }

        /* REC BAR */
        .va-rec-bar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 18px; border-radius: 14px;
            background: var(--surface);
            border: 2px solid var(--primary);
            box-shadow: 0 4px 20px rgba(0, 144, 64, 0.12), 0 0 0 1px rgba(0, 144, 64, 0.06);
            gap: 12px; margin-bottom: 16px;
            animation: rec-pulse 3s ease-in-out infinite;
        }
        @keyframes rec-pulse {
            0%, 100% { box-shadow: 0 4px 20px rgba(0, 144, 64, 0.12), 0 0 0 2px rgba(0, 144, 64, 0.08); }
            50%      { box-shadow: 0 4px 28px rgba(0, 144, 64, 0.25), 0 0 0 4px rgba(0, 144, 64, 0.15); }
        }
        .va-rec-bar .rec-eyebrow {
            font-size: 11px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.01em;
            color: #15803d; margin-bottom: 2px;
            display: flex; align-items: center; gap: 4px;
        }
        .va-rec-bar .rec-eyebrow svg { width: 12px; height: 12px; }
        .va-rec-bar .rec-title { font-size: 14px; font-weight: 700; color: var(--text); }
        .va-rec-bar .rec-cta {
            padding: 10px 20px; background: var(--primary);
            color: white; border: none; border-radius: 10px;
            font-size: 13px; font-weight: 700;
            cursor: pointer; white-space: nowrap;
            font-family: inherit;
            box-shadow: 0 2px 8px rgba(0, 144, 64, 0.25);
            display: inline-flex; align-items: center; gap: 6px;
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .va-rec-bar .rec-cta:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0, 144, 64, 0.35); }
        .va-rec-bar .rec-cta svg { width: 14px; height: 14px; }

        /* SKILL TAB BAR — only Reading + Quiz (the ones that exist) */
        .va-skill-wrap { position: relative; margin-bottom: 20px; }
        .va-tab-bar {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 3px; background: var(--tab-track);
            padding: 3px; border-radius: 11px;
            position: relative;
        }
        .va-tab-indicator {
            position: absolute; top: 3px; height: 31px;
            border-radius: 8px;
            background: var(--tab-face);
            box-shadow: 0 1px 4px var(--shadow);
            transition: left .25s cubic-bezier(.4,0,.2,1), width .25s cubic-bezier(.4,0,.2,1);
            z-index: 0; pointer-events: none;
        }
        .va-tab-btn {
            height: 31px; border: none; background: transparent;
            color: var(--text-muted);
            font-size: 11px; font-weight: 700; cursor: pointer;
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center; gap: 5px;
            position: relative; z-index: 1;
            white-space: nowrap; font-family: inherit;
            transition: color .15s;
        }
        .va-tab-btn.active { color: var(--text); }
        .va-tab-btn .tab-icon-sq {
            display: inline-flex; align-items: center; justify-content: center;
            width: 20px; height: 20px;
            border-radius: 5px;
            flex-shrink: 0;
            opacity: 0.55;
            transition: opacity 0.15s;
        }
        .va-tab-btn.active .tab-icon-sq { opacity: 1; }
        .va-tab-btn .tab-icon-sq svg { width: 12px; height: 12px; }

        /* WORD GRID */
        .va-word-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 10px;
            animation: fadeIn 0.4s ease-out;
        }
        @media (min-width: 600px) {
            .va-word-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 14px; }
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes cardAppear { from { opacity: 0; transform: translateY(8px) scale(0.99); } to { opacity: 1; transform: translateY(0) scale(1); } }
        .va-word-card {
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: 14px;
            padding: 16px 14px;
            cursor: pointer;
            transition: all 0.15s;
            box-shadow: var(--card-shadow);
            text-align: center;
            min-height: 90px;
            display: flex; align-items: center; justify-content: center;
            animation: cardAppear 280ms ease-out both;
        }
        .va-word-grid > .va-word-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--card-shadow-hover);
            border-color: var(--border-strong);
        }
        .va-word-card .card-word {
            font-size: 15px; font-weight: 700;
            color: var(--text); line-height: 1.3;
        }

        /* WORD MODAL */
        #modalBackdrop {
            position: fixed; inset: 0;
            background: rgba(0, 0, 0, 0.35);
            opacity: 0; transition: opacity 0.25s ease;
            z-index: 99; pointer-events: none;
        }
        #modalBackdrop.active { opacity: 1; pointer-events: auto; }
        .va-word-modal {
            position: fixed;
            left: 0; right: 0; bottom: 0;
            background: var(--surface);
            border-radius: 24px 24px 0 0;
            box-shadow: 0 -8px 40px rgba(0, 0, 0, 0.15);
            transform: translateY(100%);
            transition: transform 0.32s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100; max-height: 92vh;
            display: flex; flex-direction: column;
        }
        .va-word-modal.active { transform: translateY(0); }
        @media (min-width: 600px) and (max-height: 1000px) {
            .va-word-modal {
                left: 50%; right: auto; bottom: 0; top: 0;
                transform: translate(-50%, 100%);
                width: 100%; max-width: 720px;
                max-height: 100vh; height: 100vh;
                border-radius: 0;
            }
            .va-word-modal.active { transform: translate(-50%, 0); }
        }
        .modal-top { padding: 12px 16px 8px; flex-shrink: 0; }
        .drag-handle {
            width: 40px; height: 4px;
            background: var(--border);
            border-radius: 2px;
            margin: 0 auto 8px;
        }
        .modal-top-row { display: flex; align-items: center; justify-content: flex-end; }
        .modal-close {
            width: 36px; height: 36px;
            border-radius: 50%;
            border: 1.5px solid var(--border);
            background: var(--surface-elevated);
            cursor: pointer;
            font-size: 20px;
            display: flex; align-items: center; justify-content: center;
            color: var(--text); font-family: inherit;
        }
        .modal-body {
            flex: 1; min-width: 0;
            overflow-y: auto;
            padding: 0 20px 32px;
            text-align: left;
        }
        .va-word-head {
            display: flex; gap: 14px; align-items: stretch;
            margin-bottom: 12px;
        }
        .va-word-left {
            flex: 0 0 50%;
            padding-right: 14px;
            border-right: 2px solid rgba(0, 80, 40, 0.28);
        }
        .va-word-left-inner {
            display: flex; align-items: flex-start; gap: 10px;
            margin-bottom: 6px; justify-content: flex-end;
        }
        .speaker-btn {
            flex-shrink: 0; width: 32px; height: 32px;
            border-radius: 50%; border: none;
            background: var(--primary); color: white;
            cursor: pointer; margin-top: 2px;
            display: inline-flex; align-items: center; justify-content: center;
            padding: 0;
            box-shadow: 0 2px 6px rgba(0, 144, 64, 0.3);
        }
        .speaker-btn svg { width: 14px; height: 14px; }
        .word-meta { display: inline-flex; flex-direction: column; min-width: 0; }
        .word-h2 {
            font-size: clamp(20px, 4.2vw, 28px);
            font-weight: 800; line-height: 1.1;
            margin: 0 0 4px; color: var(--text);
            overflow-wrap: break-word; word-break: break-word;
            text-align: right;
        }
        .word-ipa {
            font-size: 14px; font-weight: 600;
            color: var(--primary-light);
            letter-spacing: 0.3px;
            text-align: right;
        }
        .va-word-right { flex: 1; padding-left: 4px; }
        .word-meaning { font-size: 20px; font-weight: 700; color: var(--text); margin: 0 0 6px; line-height: 1.25; }
        .word-paraphrase {
            font-size: 15px; line-height: 1.65;
            margin: 8px 0;
            background: var(--surface-elevated);
            padding: 11px 16px; border-radius: 10px;
            border-left: 3px solid var(--accent);
            color: var(--text); opacity: 0.92;
        }
        .word-collo {
            font-size: 14px; margin: 8px 0;
            padding: 11px 16px;
            background: rgba(0, 144, 64, 0.06);
            border-radius: 10px;
            border-left: 3px solid var(--primary);
            color: var(--text-sub); line-height: 1.5;
        }
        .word-collo strong { color: var(--primary-dark); font-weight: 700; }

        /* ============================================================
           YOUGLISH WORD VIDEO PLAYLIST — verbatim from WordVideoPlaylist.jsx
           ============================================================ */
        .yg-section-label {
            margin-top: 14px;
            font-size: 11px; font-weight: 800;
            color: var(--text-muted);
            letter-spacing: 0.14em; text-transform: uppercase;
            margin-bottom: 8px;
            display: flex; align-items: center; gap: 6px;
        }
        .yg-section-label svg { width: 12px; height: 12px; }
        .yg-wrap { display: flex; flex-direction: column; gap: 8px; width: 100%; min-width: 0; }
        .yg-controls {
            display: flex; gap: 6px;
            position: sticky; top: 0; z-index: 5;
            background: #ffffff;
            padding: 4px 0 8px;
            border-bottom: 1px solid #dedad2;
            margin-bottom: 4px;
        }
        .yg-ctrl-btn {
            flex: 1;
            display: inline-flex; align-items: center; justify-content: center;
            gap: 4px;
            padding: 9px 6px;
            font-size: 13px; font-weight: 600;
            border: 1px solid #dedad2;
            background: #ffffff; color: #0f0e0b;
            border-radius: 6px;
            cursor: pointer; font-family: inherit;
            min-width: 0;
        }
        .yg-ctrl-btn.outline {
            border: 2px solid #009040;
            color: #009040;
            background: #ffffff;
        }
        .yg-ctrl-next {
            flex: 1.6 1 120px;
            gap: 8px;
            padding: 9px 12px;
            font-weight: 700;
            border: 2px solid #009040;
            color: #009040;
            background: #ffffff;
            border-radius: 6px;
        }
        .yg-skip-label { font-size: 12px; font-weight: 700; letter-spacing: 0.01em; font-variant-numeric: tabular-nums; }
        .yg-next-label { font-size: 13px; font-weight: 700; letter-spacing: 0.01em; }
        .yg-playerbox {
            position: relative;
            border-radius: 8px;
            max-width: 100%;
            overflow: hidden;
            min-height: 280px;
        }
        .yg-playerbox iframe { max-width: 100% !important; width: 100% !important; }
        .yg-loading {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            color: #9a9790;
            font-size: 13px; font-weight: 600;
            pointer-events: none;
        }
        .yg-empty {
            padding: 32px 20px;
            background: #f2f0eb;
            border-radius: 8px;
            text-align: center;
            border: 1px dashed #dedad2;
        }
        .yg-empty-title { font-size: 14px; font-weight: 600; color: #0f0e0b; margin: 0 0 4px; }
        .yg-empty-hint { font-size: 12px; color: #9a9790; margin: 0; }
        .yg-empty-hint a { color: #2a4a8a; font-weight: 600; text-decoration: none; }
        @media (max-width: 480px) {
            .yg-controls { gap: 4px; }
            .yg-ctrl-btn { padding: 8px 4px; font-size: 12.5px; }
        }

        /* ============================================================
           QUIZ OVERLAY — YouGlish dictation
           ============================================================ */
        #quizOverlay {
            position: fixed; inset: 0;
            background: rgba(13, 61, 31, 0.75);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            display: none;
            align-items: center; justify-content: center;
            z-index: 1000; padding: 12px;
            overflow-y: auto;
        }
        .quiz-container {
            background: var(--surface);
            width: 100%; max-width: 540px;
            padding: 22px 20px 18px;
            border-radius: 20px;
            position: relative;
            display: flex; flex-direction: column;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            margin: auto;
        }
        .quiz-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 14px;
            font-size: 11px; color: var(--text-muted); font-weight: 700;
            letter-spacing: 0.1em; text-transform: uppercase;
            font-variant-numeric: tabular-nums;
        }
        .quiz-sentence {
            background: var(--surface-elevated);
            border-left: 3px solid var(--accent);
            padding: 12px 14px;
            border-radius: 10px;
            font-size: 14px;
            color: var(--text);
            font-style: italic;
            line-height: 1.5;
            margin-bottom: 12px;
        }
        .yg-quiz-playerbox {
            position: relative;
            height: 280px;
            overflow: hidden;
            border-radius: 8px;
            background: #000;
        }
        .yg-quiz-playerbox > div { width: 100%; }
        .yg-quiz-mask {
            position: absolute; left: 0; right: 0; bottom: 0;
            height: 45px;
            background: #000;
            pointer-events: none;
            z-index: 10;
        }
        .yg-quiz-loading {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            color: rgba(255, 255, 255, 0.6);
            font-size: 13px; font-weight: 600;
            z-index: 5;
        }
        .yg-replay-btn {
            margin-top: 10px; width: 100%;
            padding: 12px;
            background: #1d4ed8; color: #fff;
            border: none; border-radius: 8px;
            font-size: 14px; font-weight: 700;
            cursor: pointer; font-family: inherit;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            transition: background 0.15s;
        }
        .yg-replay-btn:disabled { opacity: 0.5; cursor: default; }
        .yg-replay-btn svg { width: 18px; height: 18px; }
        .yg-hint { margin-top: 14px; font-size: 13px; color: #64748b; text-align: center; }
        .yg-choices { display: flex; flex-direction: column; gap: 10px; margin: 20px 0 0; }
        .yg-choice {
            border: 2px solid #e2e8f0;
            background: #fff;
            padding: 14px 18px;
            border-radius: 10px;
            cursor: pointer; font-family: inherit;
            font-size: 16px; font-weight: 600;
            color: #0f172a; text-align: left;
            display: flex; align-items: center; justify-content: space-between;
            transition: all 0.15s;
        }
        .yg-choice:hover:not(:disabled) { border-color: var(--primary); }
        .yg-choice:disabled { cursor: default; }
        .yg-choice.locked { opacity: 0.5; color: #94a3b8; cursor: default; }
        .yg-choice.correct { border-color: var(--success); background: var(--success-soft); }
        .yg-choice.wrong { border-color: var(--danger); background: var(--danger-soft); }
        .yg-choice .suffix { font-size: 14px; }
        .yg-choice.correct .suffix { color: var(--success); }
        .yg-choice.wrong .suffix { color: var(--danger); }

        .btn-stop {
            margin-top: 18px; align-self: center;
            border: none; background: none;
            color: var(--text-muted); font-weight: 700;
            font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
            cursor: pointer; padding: 10px;
            font-family: inherit;
        }

        /* MILESTONE */
        .milestone-screen {
            padding: 32px 4px 12px;
            text-align: center;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 480px;
        }
        .milestone-icon-wrap {
            width: 72px; height: 72px;
            display: inline-flex; align-items: center; justify-content: center;
            border-radius: 20px; margin-bottom: 10px;
        }
        .milestone-icon-wrap.win { background: rgba(0, 144, 64, 0.10); color: var(--primary); }
        .milestone-icon-wrap.mid { background: rgba(245, 158, 11, 0.12); color: var(--accent); }
        .milestone-icon-wrap.low { background: rgba(220, 38, 38, 0.10); color: var(--danger); }
        .milestone-icon-wrap svg { width: 38px; height: 38px; }
        .milestone-title {
            font-size: 11px; font-weight: 800;
            color: var(--text-muted);
            letter-spacing: 0.16em; text-transform: uppercase;
            margin-bottom: 4px;
        }
        .milestone-score {
            font-size: 88px; font-weight: 800;
            color: var(--text); margin: 6px 0;
            letter-spacing: -0.04em; line-height: 1;
            font-variant-numeric: tabular-nums;
        }
        .milestone-score .pct {
            font-size: 28px; font-weight: 700;
            color: var(--text-muted);
            margin-left: 2px; vertical-align: top;
            position: relative; top: 14px;
        }
        .milestone-msg {
            font-weight: 600; color: var(--text-sub);
            margin-bottom: 24px;
            font-size: 15px; padding: 0 14px; line-height: 1.5;
            max-width: 380px;
        }
        .action-btn {
            background: var(--primary); color: #fff;
            border: none; padding: 14px 28px;
            border-radius: 12px;
            font-weight: 700; cursor: pointer;
            width: 100%; margin-top: 8px;
            font-size: 15px; letter-spacing: 0.01em;
            font-family: inherit;
            box-shadow: 0 4px 16px rgba(0, 144, 64, 0.28);
        }
        .secondary-btn {
            background: transparent;
            color: var(--text-sub);
            border: 1.5px solid var(--border);
            padding: 12px 28px; border-radius: 12px;
            font-weight: 700; cursor: pointer;
            width: 100%; margin-top: 8px;
            font-size: 14px; font-family: inherit;
        }

        /* MODE */
        .mode-title { font-size: 22px; font-weight: 800; color: var(--text); letter-spacing: -0.02em; margin-bottom: 4px; }
        .mode-sub { font-size: 13px; color: var(--text-sub); margin-bottom: 22px; font-weight: 500; }
        .mode-grid { display: flex; flex-direction: column; gap: 10px; width: 100%; }
        .mode-btn {
            border: 1.5px solid var(--border);
            border-radius: 14px;
            background: var(--surface);
            padding: 12px 14px;
            font-family: inherit; font-weight: 700;
            font-size: 15px; color: var(--text);
            cursor: pointer;
            display: flex; align-items: center; gap: 14px;
            text-align: left;
            box-shadow: var(--card-shadow);
        }

    const SPEAKER_SVG = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>';

    let currentTab = 'reading';

    function populateVoices() {
        const allVoices = synth.getVoices();
        allowedVoices = allVoices.filter(v =>
            (v.lang.includes('en-US') || v.lang.includes('en-GB')) &&
            !v.name.includes('David') && !v.name.includes('Zira')
        );
    }
    if (speechSynthesis.onvoiceschanged !== undefined) speechSynthesis.onvoiceschanged = populateVoices;

    function speak(text) {
        synth.cancel();
        const ut = new SpeechSynthesisUtterance(text);
        if (allowedVoices.length > 0) {
            const v = allowedVoices.find(v => v.lang.includes('en-GB') && (v.name.includes('Google') || v.name.includes('Natural')))
                || allowedVoices.find(v => v.lang.includes('en-GB'))
                || allowedVoices[0];
            ut.voice = v;
        }
        ut.rate = 0.85;
        synth.speak(ut);
    }

    function playSound(type) {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        if (type === 'correct') {
            osc.frequency.setValueAtTime(880, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1320, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime); osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        } else {
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(220, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime); osc.start(); osc.stop(audioCtx.currentTime + 0.4);
        }
    }

    function startApp() {
        document.getElementById('audioUnlocker').style.display = 'none';

    // ── Tab bar ──
    function buildTabBar() {
        const bar = document.getElementById('tabBar');

        bar.innerHTML = '';

            const btn = document.createElement('button');
            btn.className = 'va-tab-btn' + (tab.view === currentTab ? ' active' : '');
            btn.dataset.view = tab.view;
            btn.innerHTML = `<span class="tab-icon-sq" style="background: ${tab.color}">${tab.svg}</span>${tab.label}`;
            btn.onclick = () => switchTab(tab.view);
            bar.appendChild(btn);
        });
    }
    function moveTabIndicator(view) {
        const bar = document.getElementById('tabBar');
        const indicator = document.getElementById('tabIndicator');
        const target = bar.querySelector(`.va-tab-btn[data-view="${view}"]`);
        if (!target || !indicator) return;
        const barRect = bar.getBoundingClientRect();
        const tRect = target.getBoundingClientRect();
        indicator.style.left = (tRect.left - barRect.left) + 'px';
        indicator.style.width = tRect.width + 'px';
    }
    function switchTab(view) {
        currentTab = view;
        document.querySelectorAll('.va-tab-btn').forEach(b => b.classList.toggle('active', b.dataset.view === view));
        moveTabIndicator(view);
        if (view === 'reading') {
            document.getElementById('contentArea').innerHTML = '<div class="va-word-grid" id="vocabGrid"></div>';
            buildGrid();
        } else if (view === 'quiz') {
            openModeSelection();
        }

    // ── Word grid ──

        const grid = document.getElementById('vocabGrid');

            const card = document.createElement('div');

            card.innerHTML = `<span class="card-word">${word}</span>`;
            card.onclick = () => openModal(word);
            grid.appendChild(card);
        });
    }

    // ────────────────────────────────────────────────────────────
    // YouGlish loader — verbatim from WordVideoPlaylist.jsx
    // ────────────────────────────────────────────────────────────
    const YG_SCRIPT = 'https://youglish.com/public/emb/widget.js';
    function loadYouGlish() {
        if (window.YG && window.YG.Widget) return Promise.resolve(window.YG);
        return new Promise((resolve) => {
            const prev = window.onYouglishAPIReady;
            window.onYouglishAPIReady = () => {
                if (typeof prev === 'function') prev();
                resolve(window.YG);
            };
            if (!document.getElementById('youglish-api')) {
                const tag = document.createElement('script');
                tag.id = 'youglish-api';
                tag.src = YG_SCRIPT;
                document.head.appendChild(tag);
            }
        });
    }
    function getPronounceableText(phrase) {
        if (!phrase) return '';
        let s = String(phrase);
        s = s.split(/\s*(?:><|=|\/)\s*/)[0];
        s = s.replace(/\([^)]*\)/g, '');
        s = s.replace(/\bsb's\b/gi, "someone's");
        s = s.replace(/\bsb\b/gi, 'someone');
        s = s.replace(/\bsth\b/gi, 'something');
        s = s.replace(/\s+/g, ' ').trim();
        return s;
    }
    function generateFallbackQueries(phrase) {
        const cleaned = getPronounceableText(phrase);
        if (!cleaned) return [];
        const words = cleaned.split(/\s+/).filter(Boolean);
        if (words.length <= 1) return [cleaned];
        const queries = [cleaned];
        for (let i = words.length - 1; i >= 1; i--) {
            queries.push(words.slice(0, i).join(' '));
        }
        return queries;
    }

                <div class="va-word-left">
                    <div class="va-word-left-inner">
                        <button class="speaker-btn" aria-label="Phát âm" onclick="speak(${JSON.stringify(word)})">${SPEAKER_SVG}</button>
                        <div class="word-meta">
                            <h2 class="word-h2">${word}</h2>
                            <span class="word-ipa">${info.ipa}</span>
                        </div>
                    </div>
                </div>
                <div class="va-word-right">
                    <div class="word-meaning">${info.meaning}</div>
                </div>
            </div>
            <div class="word-paraphrase">${info.def}</div>
            <div class="word-collo"><strong>Cụm thường gặp:</strong> ${info.collo}</div>
            <div class="word-collo"><strong>Ví dụ:</strong> ${info.sentence}</div>

            <div class="yg-section-label">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                Người bản xứ nói thế nào
            </div>
            <div class="yg-wrap" id="ygModalWrap">
                <div class="yg-controls">
                    <button class="yg-ctrl-btn" onclick="modalWidget?.previous?.()" aria-label="Clip trước">${ICON_PREV}</button>
                    <button class="yg-ctrl-btn" onclick="modalWidget?.move?.(-5)" aria-label="Lùi 5 giây"><span class="yg-skip-label">−5s</span></button>
                    <button class="yg-ctrl-btn outline" onclick="modalWidget?.replay?.()" aria-label="Lặp lại">${ICON_REPLAY_FILL}</button>
                    <button class="yg-ctrl-btn" onclick="modalWidget?.move?.(5)" aria-label="Tiến 5 giây"><span class="yg-skip-label">+5s</span></button>
                    <button class="yg-ctrl-next" onclick="modalWidget?.next?.()" aria-label="Clip tiếp theo">
                        <span class="yg-next-label">Clip sau</span>${ICON_NEXT_BOLD}
                    </button>
                </div>
                <div class="yg-playerbox" id="ygPlayerBox">
                    <div id="${playerId}"></div>
                    <div class="yg-loading" id="ygModalLoading">Đang tải clip…</div>
                </div>
            </div>
        `;
        document.getElementById('modalBackdrop').classList.add('active');
        document.getElementById('wordModal').classList.add('active');
        speak(word);

        // Load YouGlish widget for this word
        const queries = generateFallbackQueries(word);
        let queryIdx = 0;
        loadYouGlish().then(YG => {
            if (!YG) return;
            try {
                const el = document.getElementById(playerId);
                if (!el) return;
                const measured = el.parentElement?.clientWidth || el.clientWidth || 480;
                const widgetWidth = Math.min(480, Math.max(200, Math.round(measured)));
                const w = new YG.Widget(playerId, {
                    width: widgetWidth,
                    height: 600,
                    components: 8,
                    events: {
                        onFetchDone: (e) => {
                            if (e.totalResult === 0 && queryIdx < queries.length - 1) {
                                queryIdx++;
                                try { w.fetch(queries[queryIdx], 'English', 'us'); } catch {}
                                return;
                            }
                            if (e.totalResult === 0) {
                                const pb = document.getElementById('ygPlayerBox');
                                if (pb) pb.innerHTML = `
                                    <div class="yg-empty">
                                        <p class="yg-empty-title">Chưa có clip cho từ này</p>
                                        <p class="yg-empty-hint">Thử <a href="https://youglish.com/pronounce/${encodeURIComponent(getPronounceableText(word))}/english" target="_blank" rel="noopener noreferrer">tìm rộng hơn</a>.</p>
                                    </div>`;
                            }
                        },
                        onPlayerReady: () => {
                            document.getElementById('ygModalLoading')?.remove();
                        },
                        onPlayerStateChange: (e) => {
                            const state = typeof e === 'number' ? e : (e?.data ?? e?.state);
                            if (state === 0) {
                                try { modalWidget?.replay?.(); } catch {}
                            }
                        },
                    },
                });
                modalWidget = w;
                w.fetch(queries[0], 'English', 'us');
            } catch (err) {
                console.error(err);
                const loading = document.getElementById('ygModalLoading');
                if (loading) loading.textContent = 'Không tải được clip';
            }
        });
    }
    function closeModal() {
        document.getElementById('modalBackdrop').classList.remove('active');
        document.getElementById('wordModal').classList.remove('active');
        try { modalWidget?.close?.(); } catch {}
        modalWidget = null;
    }

    // ────────────────────────────────────────────────────────────
    // QUIZ — YouGlish dictation
    // ────────────────────────────────────────────────────────────
    let quizQueue = [];
    let currentQuiz = null;
    let wrongAnswerBuffer = [];
    let sessionStats = { correctInMilestone: 0, questionsInMilestone: 0, totalCorrect: 0, milestoneSize: 10, currentLimit: 10 };

    function openModeSelection() {
        document.getElementById('quizOverlay').style.display = 'flex';
        const container = document.getElementById('quizContainer');
        const total = Object.keys(VOCAB_DATA).length;
        container.innerHTML = `
            <div class="milestone-screen">
                <div class="mode-title">Quiz YouGlish Dictation</div>
                <div class="mode-sub">Nghe clip → chọn đúng từ. Chọn số câu để bắt đầu</div>
                <div class="mode-grid">
                    <button class="mode-btn" onclick="startQuiz(10)">
                        <span class="mode-num">10</span>
                        <span class="mode-label">10 câu<small>Khởi động nhanh</small></span>
                        <span class="mode-arrow">${ARROW_RIGHT_SVG}</span>
                    </button>
                    <button class="mode-btn" onclick="startQuiz(20)">
                        <span class="mode-num">20</span>
                        <span class="mode-label">20 câu<small>Luyện chắc tay</small></span>
                        <span class="mode-arrow">${ARROW_RIGHT_SVG}</span>
                    </button>
                    <button class="mode-btn" onclick="startQuiz(${total})">
                        <span class="mode-num">${total}</span>
                        <span class="mode-label">Toàn bộ ${total} từ<small>Kiểm tra tổng quát</small></span>
                        <span class="mode-arrow">${ARROW_RIGHT_SVG}</span>
                    </button>
                </div>
                <button class="cancel-btn" onclick="closeQuiz()">Hủy bỏ</button>
            </div>
        `;
    }
    function startQuiz(limit) {
        sessionStats.currentLimit = limit;
        sessionStats.milestoneSize = limit;
        const allWords = Object.keys(VOCAB_DATA).sort(() => Math.random() - 0.5);
        quizQueue = allWords.slice(0, limit);
        wrongAnswerBuffer = [];
        sessionStats.correctInMilestone = 0;
        sessionStats.questionsInMilestone = 0;
        sessionStats.totalCorrect = 0;
        nextQuestion();
    }
    function shuffle(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
    }
    function closeQuiz() {
        document.getElementById('quizOverlay').style.display = 'none';
        try { currentQuiz?.widget?.close?.(); } catch {}
        currentQuiz = null;
    }
    function maskWord(str, target) {
        const cleanTarget = target.replace(/^to\s+/, '').replace(/^(a|an|the)\s+/, '');
        const regex = new RegExp(cleanTarget.replace(/[-/\\^$*+?.()|[\]{}]/g, '\\$&'), 'gi');
        return str.replace(regex, '________');
    }
    function nextQuestion() {
        if (sessionStats.questionsInMilestone >= sessionStats.milestoneSize && quizQueue.length > 0) return showMilestone();
        if (quizQueue.length === 0 && wrongAnswerBuffer.length > 0) quizQueue.push(wrongAnswerBuffer.shift());
        if (quizQueue.length === 0) return showMilestone(true);

        const target = quizQueue.shift();
        const info = VOCAB_DATA[target];
        const distractors = Object.keys(VOCAB_DATA)
            .filter(w => w !== target)
            .sort(() => Math.random() - 0.5)
            .slice(0, 2);
        const choices = shuffle([target, ...distractors]);

        currentQuiz = { target, meaning: info.meaning, sentence: info.sentence, choices, picked: null, hasPlayed: false, widget: null };
        renderQuizQuestion();
    }
    function renderQuizQuestion() {
        const q = currentQuiz;
        const container = document.getElementById('quizContainer');
        const playerId = 'yg-quiz-' + Math.random().toString(36).slice(2, 10);
        container.innerHTML = `
            <div class="quiz-header">
                <span>Câu ${sessionStats.questionsInMilestone + 1} / ${sessionStats.milestoneSize}</span>
                <span>YouGlish Dictation</span>
            </div>
            <div class="quiz-sentence">"${maskWord(q.sentence, q.target)}"</div>
            <div class="yg-quiz-playerbox">
                <div id="${playerId}"></div>
                <div class="yg-quiz-loading" id="ygQuizLoading">Đang tải clip…</div>
                <div class="yg-quiz-mask"></div>
            </div>
            <button class="yg-replay-btn" id="ygReplay" disabled>${REPLAY_SVG}Nghe lại clip</button>
            <div class="yg-hint" id="ygHint">Bấm play trên clip để mở khoá đáp án</div>
            <div class="yg-choices" id="ygChoices"></div>
            <button class="btn-stop" onclick="closeQuiz()">Dừng chơi</button>
        `;
        const choicesEl = document.getElementById('ygChoices');
        q.choices.forEach((choice, i) => {
            const btn = document.createElement('button');
            btn.className = 'yg-choice locked';
            btn.disabled = true;
            btn.innerHTML = `<span>${choice}</span><span class="suffix"></span>`;
            btn.onclick = () => handlePick(choice, btn);
            choicesEl.appendChild(btn);
        });

        const queries = generateFallbackQueries(q.target);
        let queryIdx = 0;
        loadYouGlish().then(YG => {
            if (!YG || !currentQuiz || currentQuiz.target !== q.target) return;
            try {
                const el = document.getElementById(playerId);
                if (!el) return;
                const measured = el.parentElement?.clientWidth || 480;
                const w = new YG.Widget(playerId, {
                    width: Math.min(480, Math.max(280, measured)),
                    height: 600,
                    components: 16,
                    events: {
                        onFetchDone: (e) => {
                            if (!currentQuiz || currentQuiz.target !== q.target) return;
                            if (e.totalResult === 0 && queryIdx < queries.length - 1) {
                                queryIdx++;
                                try { w.fetch(queries[queryIdx], 'English', 'us'); } catch {}
                                return;
                            }
                            document.getElementById('ygQuizLoading')?.remove();
                            const r = document.getElementById('ygReplay');
                            if (r) {
                                r.disabled = false;
                                r.onclick = () => { try { w.replay?.(); } catch {} };
                            }
                        },
                        onPlayerStateChange: (e) => {
                            if (!currentQuiz || currentQuiz.target !== q.target) return;
                            const state = typeof e === 'number' ? e : (e?.data ?? e?.state);
                            if (state === 1 && !currentQuiz.hasPlayed) {
                                currentQuiz.hasPlayed = true;
                                unlockChoices();
                            }
                            if (state === 0) {
                                try { w.replay?.(); } catch {}
                            }
                        }
                    }
                });
                currentQuiz.widget = w;
                w.fetch(queries[0], 'English', 'us');
            } catch (err) { console.error(err); }
        });
    }
    function unlockChoices() {
        document.getElementById('ygHint')?.remove();
        document.querySelectorAll('#ygChoices .yg-choice').forEach(b => {
            b.classList.remove('locked');
            b.disabled = false;
        });
    }
    function handlePick(choice, btn) {
        const q = currentQuiz;
        if (!q || q.picked || !q.hasPlayed) return;
        q.picked = choice;
        const isCorrect = choice === q.target;
        document.querySelectorAll('#ygChoices .yg-choice').forEach(b => {
            b.disabled = true;
            const text = b.querySelector('span').textContent;
            const suffix = b.querySelector('.suffix');
            if (text === q.target) {
                b.classList.add('correct');
                if (suffix) suffix.textContent = '✓ ' + q.meaning;
            } else if (text === choice && !isCorrect) {
                b.classList.add('wrong');
                if (suffix) suffix.textContent = '✗';
            }
        });
        if (isCorrect) { sessionStats.totalCorrect++; sessionStats.correctInMilestone++; playSound('correct'); }
        else { playSound('wrong'); wrongAnswerBuffer.push(q.target); }
        sessionStats.questionsInMilestone++;
        setTimeout(nextQuestion, 2000);
    }
    function showMilestone(isFinal = false) {
        const total = isFinal ? sessionStats.questionsInMilestone : sessionStats.milestoneSize;
        const correct = sessionStats.correctInMilestone;
        const percent = total > 0 ? Math.round((correct / total) * 100) : 0;
        let message = "", iconHTML = "", iconClass = "mid";
        if (percent === 100)    { message = "Hoàn hảo! Bạn nắm chắc cả 30 từ rồi đó."; iconHTML = ICON_TROPHY; iconClass = "win"; }
        else if (percent >= 90) { message = "Gần như hoàn hảo. Một chút nữa thôi."; iconHTML = ICON_SPARK; iconClass = "win"; }
        else if (percent >= 80) { message = "Khá tốt — bạn đang đi đúng hướng."; iconHTML = ICON_SPARK; iconClass = "mid"; }
        else if (percent >= 50) { message = "Vượt qua mốc trung bình. Tiếp tục luyện thêm nhé."; iconHTML = ICON_TARGET; iconClass = "mid"; }
        else                    { message = "Cần ôn lại một chút. Đừng bỏ cuộc."; iconHTML = ICON_REFRESH_OUTLINE; iconClass = "low"; }
        const container = document.getElementById('quizContainer');
        container.innerHTML = `
            <div class="milestone-screen">
                <div class="milestone-icon-wrap ${iconClass}">${iconHTML}</div>
                <div class="milestone-title">${isFinal ? 'Kết quả' : 'Checkpoint'}</div>
                <div class="milestone-score">${percent}<span class="pct">%</span></div>
                <p class="milestone-msg">${message}</p>
                ${percent < 50 ? `<button class="action-btn" onclick="retryFailed()">Học lại từ sai</button>` :
                    (quizQueue.length > 0 ? `<button class="action-btn" onclick="resume()">Tiếp tục</button>` : '')}
                <button class="secondary-btn" onclick="closeQuiz()">${isFinal || (percent < 50 && wrongAnswerBuffer.length == 0) ? 'Về trang chính' : 'Dừng lại'}</button>
            </div>
        `;
    }
    function retryFailed() {
        if (wrongAnswerBuffer.length > 0) { quizQueue = [...wrongAnswerBuffer]; wrongAnswerBuffer = []; }
        else { startQuiz(sessionStats.currentLimit); return; }
        sessionStats.correctInMilestone = 0;
        sessionStats.questionsInMilestone = 0;
        nextQuestion();
    }
    function resume() {
        sessionStats.correctInMilestone = 0;
        sessionStats.questionsInMilestone = 0;
        nextQuestion();
    }
</script>
</body>
</html>
